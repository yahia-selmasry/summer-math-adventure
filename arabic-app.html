// ── Load external content if available ────────────────────────────────────────
function useContent() {
  const [lessons,  setLessons]  = useState(FALLBACK_LESSONS);
  const [banks,    setBanks]    = useState(FALLBACK_BANKS);
  const [loaded,   setLoaded]   = useState(false);

  useEffect(() => {
    fetch("arabic_content.json")
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data && data.lessons && data.lessons.length > 0) {
          setLessons(data.lessons);
          // merge banks: external has items array; add titleAr if missing
          const ext = data.topicBanks || {};
          const merged = { ...FALLBACK_BANKS };
          ["noun-verb","singular-plural","word-meaning","grammar"].forEach(k => {
            if (ext[k] && Array.isArray(ext[k])) {
              merged[k] = { ...(FALLBACK_BANKS[k]||{}), items: ext[k] };
            }
          });
          setBanks(merged);
          setLoaded(true);
        }
      })
      .catch(() => {});
  }, []);

  return { lessons, banks, loaded };
}

// ── Drill session builder ─────────────────────────────────────────────────────
function buildDrillSession(bankKey, banks, progress, count=10) {
  const bank = banks[bankKey];
  if (!bank) return [];
  const wrongCounts = progress?.drillWrong?.[bankKey] || {};
  const weighted = bank.items.flatMap(item => {
    const key = item.word || item.topic || "";
    const w = Math.min(3, 1 + (wrongCounts[key]||0));
    return Array(w).fill(item);
  });
  return shuffle(weighted).slice(0, count);
}

// ── Week grouping ─────────────────────────────────────────────────────────────
function groupByWeek(lessons) {
  const weeks = {};
  lessons.forEach(l => {
    const w = l.week || 1;
    if (!weeks[w]) weeks[w] = [];
    weeks[w].push(l);
  });
  return weeks;
}

// ── Comprehension quiz ────────────────────────────────────────────────────────
function ComprehensionQuiz({ lesson, onFinish }) {
  const [idx,setIdx]           = useState(0);
  const [selected,setSelected] = useState(null);
  const [score,setScore]       = useState(0);
  const [done,setDone]         = useState(false);
  const [feedback,setFeedback] = useState(null); // "correct" | "wrong"
  const q = lesson.comprehension[idx];

  const choose = i => {
    if(selected!==null)return;
    setSelected(i);
    const isRight = i===q.answer;
    if(isRight) setScore(s=>s+1);
    setFeedback(isRight?"correct":"wrong");
  };
  const next = () => {
    setFeedback(null);
    if(idx+1<lesson.comprehension.length){setIdx(i=>i+1);setSelected(null);}
    else setDone(true);
  };

  if(done){
    const pct=Math.round(score/lesson.comprehension.length*100);
    const [msg,big] = pct>=75?["أَحْسَنْتَ! أَنْتَ نَجْم! ⭐","🏆"]:pct>=50?["جَيِّدٌ جِدًّا! 👍","🌟"]:["حَاوِلْ مَرَّةً أُخْرَى! 💪","💪"];
    return e("div",{className:"pop",style:{textAlign:"center",padding:"28px 0"}},
      e("div",{className:"star-pop",style:{fontSize:80,marginBottom:10}},big),
      e("h3",{style:{...AF,fontSize:26,fontWeight:900,color:"#c2410c",direction:"rtl",marginBottom:8}},msg),
      e("p",{style:{fontSize:16,color:P.gray,marginBottom:28}},`${score} من ${lesson.comprehension.length} صحيح (${pct}%)`),
      e("button",{onClick:()=>onFinish(pct),
        style:{background:"linear-gradient(135deg,#fbbf24,#f97316)",color:"#fff",border:"none",
          borderRadius:16,padding:"16px 36px",fontSize:17,fontWeight:900,
          boxShadow:"0 6px 24px rgba(249,115,22,.45)"}},
        "التَّالِي ✨")
    );
  }

  return e("div",{className:"slide"},
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
      e("span",{style:{fontSize:13,color:P.gray,fontWeight:700}},`${idx+1} / ${lesson.comprehension.length}`),
      e("div",{style:{display:"flex",gap:6}},
        ...lesson.comprehension.map((_,i)=>
          e("div",{key:i,style:{width:10,height:10,borderRadius:5,
            background:i<idx?"#22c55e":i===idx?"#f97316":"#e5e7eb",
            transition:"background .3s"}})
        )
      ),
      e("div",{style:{display:"flex",alignItems:"center",gap:4}},
        e("span",{style:{fontSize:18}},"⭐"),
        e("span",{style:{fontSize:14,color:"#f97316",fontWeight:900}},`${score}`))
    ),
    // feedback banner
    feedback && e("div",{className:"pop",style:{
      background:feedback==="correct"?"#dcfce7":"#fee2e2",
      border:`2px solid ${feedback==="correct"?"#22c55e":"#ef4444"}`,
      borderRadius:14,padding:"10px 18px",marginBottom:14,
      display:"flex",alignItems:"center",gap:10,direction:"rtl"}},
      e("span",{style:{fontSize:28}},feedback==="correct"?"🎉":"😅"),
      e("span",{style:{...AF,fontSize:17,fontWeight:900,
        color:feedback==="correct"?"#15803d":"#991b1b"}},
        feedback==="correct"?"صَحِّ! أَحْسَنْت! 🌟":"حَاوِلْ مَرَّة ثَانِيَة 💪")
    ),
    e("div",{style:{background:"linear-gradient(135deg,#fff7ed,#ffedd5)",borderRadius:18,padding:22,marginBottom:20,
      border:"1.5px solid #fed7aa",boxShadow:"0 4px 16px rgba(249,115,22,.1)"}},
      e("p",{style:{...AF,fontSize:22,fontWeight:700,color:"#1c1917",direction:"rtl",lineHeight:1.9,margin:0}},q.question)

// ── Grammar game ──────────────────────────────────────────────────────────────
function GrammarGame({ lesson, onFinish }) {
  const [idx,setIdx]       = useState(0);
  const [typeAns,setTypeAns] = useState(null);
  const [numAns,setNumAns] = useState(null);
  const [correct,setCorrect] = useState(0);
  const [done,setDone]     = useState(false);
  const item = lesson.grammar[idx];

  const chooseNum = n => {
    setNumAns(n);
    if(typeAns===item.type && n===item.number) setCorrect(c=>c+1);
    setTimeout(()=>{
      if(idx+1<lesson.grammar.length){setIdx(i=>i+1);setTypeAns(null);setNumAns(null);}
      else setDone(true);
    },900);
  };

  if(done){
    const pct=Math.round(correct/lesson.grammar.length*100);
    return e("div",{className:"pop",style:{textAlign:"center",padding:"28px 0"}},
      e("div",{className:"star-pop",style:{fontSize:80,marginBottom:10}},pct>=75?"🎯":"📚"),
      e("h3",{style:{...AF,fontSize:26,fontWeight:900,color:"#c2410c",direction:"rtl",marginBottom:8}},
        pct>=75?"مَمْتَاز! أَنْتَ نَجْم! ⭐":"اِسْتَمِرَّ فِي التَّدْرِيب! 💪"),
      e("p",{style:{fontSize:16,color:P.gray,marginBottom:28}},`${correct} من ${lesson.grammar.length} صحيح (${pct}%)`),
      e("button",{onClick:()=>onFinish(pct),
        style:{background:"linear-gradient(135deg,#fbbf24,#f97316)",color:"#fff",border:"none",
          borderRadius:16,padding:"16px 36px",fontSize:17,fontWeight:900,boxShadow:"0 6px 24px rgba(249,115,22,.45)"}},
        "التَّالِي ✨")
    );
  }

  return e("div",{className:"slide"},
    e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:16}},
      e("span",{style:{fontSize:13,color:P.gray,fontWeight:700}},`${idx+1} / ${lesson.grammar.length}`),
      e("span",{style:{fontSize:13,color:P.green,fontWeight:700}},`✓ ${correct}`)
    ),
    e("div",{style:{background:"linear-gradient(135deg,#fff7ed,#ffedd5)",borderRadius:22,
      padding:36,textAlign:"center",marginBottom:24,boxShadow:"0 6px 24px rgba(249,115,22,.18)",
      border:"2px solid #fed7aa"}},
      e("span",{style:{...AF,fontSize:52,fontWeight:900,color:"#c2410c",direction:"rtl"}},item.word)
    ),
    e("div",{style:{marginBottom:20}},
      e("p",{style:{...AF,fontSize:18,color:"#1c1917",direction:"rtl",marginBottom:14,fontWeight:800,textAlign:"center"}},"هَذِهِ الكَلِمَة:"),
      e("div",{style:{display:"flex",gap:14}},
        ...["noun","verb"].map(t=>{
          let bg="#fff",border="2px solid #e5e7eb",color="#1f2937",shadow="0 2px 8px rgba(0,0,0,.06)";
          if(typeAns!==null){
            if(t===item.type){bg=P.greenL;border=`2px solid ${P.green}`;color=P.greenD;shadow="none";}
            else if(t===typeAns){bg=P.redL;border=`2px solid ${P.red}`;color="#991b1b";shadow="none";}
          }
          return e("button",{key:t,onClick:()=>setTypeAns(t),
            disabled:typeAns!==null&&numAns!==null,
            style:{flex:1,...AF,background:bg,border,borderRadius:14,padding:"18px 0",
              fontSize:24,fontWeight:700,cursor:"pointer",color,boxShadow:shadow}},
            t==="noun"?"اسْمٌ 🏷️":"فِعْلٌ ⚡");
        })
      )
    ),
    typeAns!==null && e("div",null,
      e("p",{style:{...AF,fontSize:17,color:"#374151",direction:"rtl",marginBottom:14,fontWeight:700,textAlign:"center"}},"وَهِيَ:"),
      e("div",{style:{display:"flex",gap:14}},
        ...["singular","plural"].map(n=>{
          let bg="#fff",border="2px solid #e5e7eb",color="#1f2937",shadow="0 2px 8px rgba(0,0,0,.06)";
          if(numAns!==null){
            if(n===item.number){bg=P.greenL;border=`2px solid ${P.green}`;color=P.greenD;shadow="none";}
            else if(n===numAns){bg=P.redL;border=`2px solid ${P.red}`;color="#991b1b";shadow="none";}
          }
          return e("button",{key:n,onClick:()=>chooseNum(n),disabled:numAns!==null,
            style:{flex:1,...AF,background:bg,border,borderRadius:14,padding:"18px 0",
              fontSize:22,fontWeight:700,cursor:"pointer",color,boxShadow:shadow}},
            n==="singular"?"مُفْرَد 1️⃣":"جَمْع 🔢");
        })
      )
    )
  );
}

// ── Lesson flow ───────────────────────────────────────────────────────────────
function LessonFlow({ lesson, onComplete, onBack }) {
  const [step, setStep]           = useState("passage");
  const [quizScore,setQuizScore]  = useState(0);
  const [gramScore,setGramScore]  = useState(0);
  const steps = ["passage","quiz","grammar","islamic"];
  const labels= ["قِرَاءَة","فَهْم","قَوَاعِد","إِسْلَام"];
  const si    = steps.indexOf(step);
  const cat   = CATEGORY[lesson.category] || CATEGORY.story;

  return e("div",null,
    // header strip
    e("div",{style:{background:`linear-gradient(135deg,${cat.color},#f97316)`,borderRadius:18,
      padding:"16px 20px",marginBottom:20,display:"flex",alignItems:"center",gap:12,
      boxShadow:`0 6px 20px ${cat.color}40`}},
      e("button",{onClick:onBack,style:{background:"rgba(255,255,255,.2)",border:"none",borderRadius:10,
        padding:8,flexShrink:0}},I.back(18,"#fff")),
      e("span",{style:{fontSize:28}},lesson.emoji||"📖"),
      e("div",{style:{flex:1,overflow:"hidden"}},
        e("h2",{style:{...AF,fontSize:18,fontWeight:700,color:"#fff",direction:"rtl",
          margin:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},lesson.title),
        e("p",{style:{fontSize:11,color:"rgba(255,255,255,.8)",margin:0,direction:"ltr"}},
          `Week ${lesson.week||1} · Level ${lesson.level}`)
      )
    ),
    // progress bar
    e("div",{style:{display:"flex",gap:6,marginBottom:6}},
      ...steps.map((_,i)=>e("div",{key:i,style:{flex:1,height:6,borderRadius:3,
        background:i<=si?cat.color:"#e5e7eb",transition:"background .3s"}}))
    ),
    e("div",{style:{display:"flex",gap:6,marginBottom:20,direction:"rtl"}},
      ...labels.map((l,i)=>e("span",{key:i,style:{flex:1,textAlign:"center",...AF,fontSize:11,
        color:i===si?cat.color:P.gray,fontWeight:i===si?800:400}}," "+l))
    ),
    step==="passage" && e(PassageView,{lesson,onNext:()=>setStep("quiz")}),
    step==="quiz"    && e(ComprehensionQuiz,{lesson,onFinish:p=>{setQuizScore(p);setStep("grammar");}}),
    step==="grammar" && e(GrammarGame,{lesson,onFinish:p=>{setGramScore(p);setStep("islamic");}}),
    step==="islamic" && e(IslamicCard,{lesson,onFinish:()=>onComplete(lesson.id,quizScore,gramScore)})
  );
}

// ── Drill session ─────────────────────────────────────────────────────────────
function DrillSession({ bankKey, banks, progress, onFinish, onHome }) {
  const [items]          = useState(()=>buildDrillSession(bankKey,banks,progress));
  const [idx,setIdx]     = useState(0);
  const [selected,setSel]= useState(null);
  const [score,setScore] = useState(0);
  const [wrongs,setWrongs]= useState({});
  const [done,setDone]   = useState(false);
  const item = items[idx];

  const choose = ans => {
    if(selected!==null)return;
    setSel(ans);
    if(ans===item.answer) setScore(s=>s+1);
    else { const k=item.word||item.topic||""; setWrongs(w=>({...w,[k]:(w[k]||0)+1})); }
  };
  const next = ()=>{
    if(idx+1<items.length){setIdx(i=>i+1);setSel(null);}
    else setDone(true);
  };

  if(done){
    const pct=Math.round(score/items.length*100);
    return e("div",{className:"pop",style:{textAlign:"center",padding:28}},
      e("div",{className:"star-pop",style:{fontSize:84,marginBottom:10}},pct>=80?"🏆":pct>=50?"⭐":"💪"),
      e("h3",{style:{...AF,fontSize:28,fontWeight:900,color:"#c2410c",direction:"rtl",marginBottom:8}},
        pct>=80?"مَمْتَاز! أَنْتَ نَجْم! 🌟":pct>=50?"جَيِّدٌ جِدًّا! 👍":"اِسْتَمِرَّ في التَّدْرِيب! 💪"),
      e("p",{style:{fontSize:17,color:P.gray,marginBottom:28,fontWeight:700}},`${score} من ${items.length} صحيح (${pct}%)`),
      e("div",{style:{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}},
        onHome && e("button",{onClick:onHome,
          style:{background:"#fff7ed",color:"#c2410c",border:"2px solid #fed7aa",borderRadius:16,
            padding:"14px 24px",fontSize:15,fontWeight:900,display:"flex",alignItems:"center",gap:6}},
          I.home(16,"#f97316")," الرَّئِيسِيَّة"),
        e("button",{onClick:()=>onFinish(score,items.length,wrongs),
          style:{background:"linear-gradient(135deg,#fbbf24,#f97316)",color:"#fff",border:"none",

        border:"2px solid #e9d5ff"}},
        e("span",{style:{...AF,fontSize:56,fontWeight:900,color:"#7c3aed",direction:"rtl"}},item.word)
      ),
      e("p",{style:{...AF,fontSize:18,color:"#1c1917",direction:"rtl",marginBottom:14,fontWeight:800,textAlign:"center"}},"هَذِهِ الكَلِمَة:"),
      e("div",{style:{display:"flex",gap:14}},
        ...["noun","verb"].map(t=>{
          let bg="#fff",border="2px solid #e5e7eb",col="#1f2937";
          if(selected!==null){
            if(t===item.answer){bg=P.greenL;border=`2px solid ${P.green}`;col=P.greenD;}
            else if(t===selected){bg=P.redL;border=`2px solid ${P.red}`;col="#991b1b";}

  );
}

// ── Tasbih Counter ────────────────────────────────────────────────────────────
function TasbihCounter() {
  const TASBIHS = [
    {ar:"سُبْحَانَ اللَّه", en:"SubhanAllah", color:IP.green,  bg:IP.greenL,  target:33},
    {ar:"اَلْحَمْدُ لِلَّه",en:"Alhamdulillah",color:IP.teal,  bg:IP.tealL,   target:33},
    {ar:"اَللَّهُ أَكْبَر", en:"Allahu Akbar", color:IP.navy,  bg:IP.navyL,   target:34},
  ];
  const [sel,  setSel]  = useState(0);
  const [count,setCount]= useState(0);
  const [total,setTotal]= useState(0);
  const t = TASBIHS[sel];

  function tap() {
    const nc = count + 1;
    setCount(nc);
    setTotal(total + 1);
    if (nc >= t.target) {
      if (sel < TASBIHS.length - 1) {
        setTimeout(()=>{ setSel(sel+1); setCount(0); }, 400);
      }
    }
  }

  function reset() { setCount(0); setTotal(0); setSel(0); }

  const pct = Math.min(count / t.target, 1);
  const circ = 2 * Math.PI * 70;

  return e("div",{style:{padding:"0 4px"}},
    e("h2",{style:{...AF,fontSize:22,color:IP.green,textAlign:"center",marginBottom:16,direction:"rtl"}},"عَدَّادُ التَّسْبِيح"),

    // Phrase tabs
    e("div",{style:{display:"flex",gap:8,marginBottom:24}},
      TASBIHS.map((tb,i)=>e("button",{
        key:i,onClick:()=>{setSel(i);setCount(0);},
        style:{flex:1,padding:"10px 4px",borderRadius:12,border:"2px solid "+(i===sel?tb.color:"#e5e7eb"),
          background:i===sel?tb.bg:"#fff",color:i===sel?tb.color:"#6b7280",
          fontSize:10,fontWeight:700,lineHeight:1.4,cursor:"pointer"}
      },tb.en))
    ),

    // Circle counter
    e("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:16}},
      e("div",{style:{position:"relative",cursor:"pointer"},onClick:tap},
        e("svg",{width:180,height:180,viewBox:"0 0 160 160"},
          e("circle",{cx:80,cy:80,r:70,fill:"none",stroke:"#e5e7eb",strokeWidth:8}),
          e("circle",{cx:80,cy:80,r:70,fill:"none",stroke:t.color,strokeWidth:8,
            strokeDasharray:circ,strokeDashoffset:circ*(1-pct),
            strokeLinecap:"round",transform:"rotate(-90 80 80)",
            style:{transition:"stroke-dashoffset 0.2s"}}),
          e("text",{x:80,y:68,textAnchor:"middle",fontFamily:"'Noto Naskh Arabic',serif",
            fontSize:18,fill:t.color,fontWeight:"bold"},t.ar),
          e("text",{x:80,y:95,textAnchor:"middle",fontFamily:"system-ui",
            fontSize:36,fill:t.color,fontWeight:"bold"},count),
          e("text",{x:80,y:120,textAnchor:"middle",fontFamily:"system-ui",
            fontSize:13,fill:"#9ca3af"},"/ "+t.target)
        )
      ),
      e("p",{style:{fontSize:12,color:"#6b7280",textAlign:"center"}},
        "Tap the circle to count • Total today: ",e("strong",null,total)),
      e("button",{onClick:reset,
        style:{padding:"10px 32px",background:"#f3f4f6",color:"#6b7280",border:"none",
          borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer"}},
        "Reset"),
      count >= t.target && sel === TASBIHS.length-1 &&
        e("div",{style:{background:IP.greenL,border:"1.5px solid "+IP.green,borderRadius:16,
          padding:"16px",textAlign:"center"}},
          e("p",{style:{fontSize:20,margin:"0 0 4px"}},"🎉"),
          e("p",{style:{...AF,fontSize:16,color:IP.greenD,direction:"rtl",fontWeight:700}},
            "بَارَكَ اللَّهُ فِيكَ!"),
          e("p",{style:{fontSize:13,color:IP.green,margin:0}},
            "SubhanAllah 33 × Alhamdulillah 33 × Allahu Akbar 34 complete!"))
    )
  );
}

// ── Prayer Times Screen ───────────────────────────────────────────────────────
function PrayerTimesScreen() {
  const [times,setTimes]=useState(null);
  const [city,setCity]=useState("");
  const [err,setErr]=useState(null);
  const [loading,setLoading]=useState(false);

  function calcPrayers(lat,lon) {
    const now = new Date();
    const d = now;
    const tz = -d.getTimezoneOffset()/60;
    const jd = Math.floor(365.25*(d.getFullYear()+4716)) +
               Math.floor(30.6001*(d.getMonth()+2)) +
               d.getDate() - 1524.5;
    const D = jd - 2451545.0;
    const g = (357.529 + 0.98560028*D) % 360;
    const q = (280.459 + 0.98564736*D) % 360;
    const L = q + 1.915*Math.sin(g*Math.PI/180) + 0.020*Math.sin(2*g*Math.PI/180);
    const e2 = 23.439 - 0.00000036*D;
    const RA = Math.atan2(Math.cos(e2*Math.PI/180)*Math.sin(L*Math.PI/180),Math.cos(L*Math.PI/180))*180/Math.PI/15;
    const decl = Math.asin(Math.sin(e2*Math.PI/180)*Math.sin(L*Math.PI/180))*180/Math.PI;
    const EqT = q/15 - ((RA+360)%24);
    const Dhuhr = 12 - EqT - (lon/15 - tz);

    function angle(a) {
      const r = Math.acos((-Math.sin(a*Math.PI/180)-Math.sin(lat*Math.PI/180)*Math.sin(decl*Math.PI/180))/(Math.cos(lat*Math.PI/180)*Math.cos(decl*Math.PI/180)))*180/Math.PI;
      return r/15;
    }
    function fmt(h) {
      const total = ((h%24)+24)%24;
      const hh = Math.floor(total);
      const mm = Math.floor((total-hh)*60);
      const ampm = hh>=12?"PM":"AM";
      return `${hh%12||12}:${String(mm).padStart(2,"0")} ${ampm}`;
    }

    const fajrA   = angle(18);
    const ishaA   = angle(17);
    const asrT    = Dhuhr + Math.acos((Math.sin(Math.atan2(1,1+Math.tan(Math.abs(lat-decl)*Math.PI/180)))-Math.sin(lat*Math.PI/180)*Math.sin(decl*Math.PI/180))/(Math.cos(lat*Math.PI/180)*Math.cos(decl*Math.PI/180)))*180/Math.PI/15;

    return [
      {name:"الفَجْر",     en:"Fajr",    time:fmt(Dhuhr-fajrA), emoji:"🌅"},
      {name:"الشُّرُوق",   en:"Sunrise", time:fmt(Dhuhr-angle(0.833)), emoji:"☀️"},
      {name:"الظُّهْر",    en:"Dhuhr",   time:fmt(Dhuhr), emoji:"🌞"},
      {name:"العَصْر",     en:"Asr",     time:fmt(asrT), emoji:"🌤"},
      {name:"المَغْرِب",   en:"Maghrib", time:fmt(Dhuhr+angle(0.833)), emoji:"🌅"},
      {name:"العِشَاء",    en:"Isha",    time:fmt(Dhuhr+ishaA), emoji:"🌙"},
    ];
  }

  function locate() {
    if (!navigator.geolocation) { setErr("Geolocation not supported."); return; }
    setLoading(true); setErr(null);
    navigator.geolocation.getCurrentPosition(
      pos=>{ setTimes(calcPrayers(pos.coords.latitude,pos.coords.longitude)); setLoading(false); },
      ()=>{ setErr("Location access denied. Please allow location."); setLoading(false); }
    );
  }

  const now = new Date();
  const HH = now.getHours(), MM = now.getMinutes();
  function toMins(str){
    const [t,ap]=str.split(" ");
    const [h,m]=t.split(":").map(Number);
    return (h%12+(ap==="PM"?12:0))*60+m;
  }
  const curMins = HH*60+MM;
  let nextIdx = -1;
  if (times) {
    nextIdx = times.findIndex(t=>toMins(t.time)>curMins);
    if (nextIdx===-1) nextIdx=0;
  }

  return e("div",null,
    e("h2",{style:{...AF,fontSize:22,color:IP.teal,textAlign:"center",marginBottom:8,direction:"rtl"}},
      "أَوْقَاتُ الصَّلَاة"),
    e("p",{style:{fontSize:13,color:"#6b7280",textAlign:"center",marginBottom:16}},
      "Calculated for your location using standard method"),

    !times && e("div",{style:{textAlign:"center",padding:"24px 0"}},
      e("button",{onClick:locate,disabled:loading,
        style:{padding:"14px 28px",background:IP.green,color:"#fff",border:"none",
          borderRadius:16,fontSize:15,fontWeight:700,cursor:"pointer"}},
        loading?"Locating…":"📍 Get My Prayer Times"),
      err && e("p",{style:{color:"#ef4444",fontSize:13,marginTop:12}},err)
    ),

    times && e("div",null,
      e("div",{style:{display:"flex",flexDirection:"column",gap:8}},
        times.map((pt,i)=>e("div",{key:i,
          style:{background:i===nextIdx?IP.greenL:"#fff",
            border:"1.5px solid "+(i===nextIdx?IP.green:"#e5e7eb"),
            borderRadius:14,padding:"14px 16px",display:"flex",
            justifyContent:"space-between",alignItems:"center"}},
          e("div",{style:{display:"flex",alignItems:"center",gap:10}},
            e("span",{style:{fontSize:22}},pt.emoji),
            e("div",null,
              e("p",{style:{...AF,fontSize:16,color:i===nextIdx?IP.greenD:"#1e293b",
                margin:0,direction:"rtl",fontWeight:700}},pt.name),
              e("p",{style:{fontSize:11,color:"#6b7280",margin:0}},pt.en)
            )
          ),
          e("div",{style:{textAlign:"right"}},
            e("p",{style:{fontSize:18,fontWeight:800,color:i===nextIdx?IP.green:"#1e293b",margin:0}},pt.time),
            i===nextIdx && e("p",{style:{fontSize:10,color:IP.green,margin:0,fontWeight:700}},"Next ↑")
          )
        ))
      ),
      e("button",{onClick:()=>setTimes(null),
        style:{marginTop:16,width:"100%",background:"#f3f4f6",color:"#6b7280",
          border:"none",borderRadius:12,padding:"10px",fontSize:13,cursor:"pointer",fontWeight:600}},

// ── Islamic Quiz Screen ───────────────────────────────────────────────────────
function QuizScreen() {
  const [phase,setPhase] = useState("start"); // start|playing|done
  const [qs,setQs] = useState([]);
  const [idx,setIdx] = useState(0);
  const [score,setScore] = useState(0);
  const [chosen,setChosen] = useState(null);
  const [answered,setAnswered] = useState(false);

  function start() {
    setQs(shuffle(QUIZ_QUESTIONS).slice(0,10));
    setIdx(0); setScore(0); setChosen(null); setAnswered(false);
    setPhase("playing");
  }

  function pick(i) {
    if (answered) return;
    setChosen(i); setAnswered(true);
    if (i === qs[idx].a) setScore(s=>s+1);
  }

  function next() {
    if (idx >= qs.length-1) { setPhase("done"); return; }
    setIdx(idx+1); setChosen(null); setAnswered(false);
  }

  if (phase==="start") return e("div",{style:{textAlign:"center",padding:"24px 0"}},
    e("p",{style:{fontSize:40,margin:"0 0 8px"}},"🧠"),
    e("h2",{style:{...AF,fontSize:22,color:IP.purple,direction:"rtl",marginBottom:8}},"مُسَابَقَةٌ إِسْلَامِيَّة"),
    e("p",{style:{fontSize:14,color:"#6b7280",marginBottom:24,lineHeight:1.6}},
      "10 questions on Islamic knowledge.\nPillars, prophets, Quran & more!"),
    e("button",{onClick:start,
      style:{padding:"14px 32px",background:IP.purple,color:"#fff",border:"none",
        borderRadius:16,fontSize:16,fontWeight:700,cursor:"pointer"}},
      "Start Quiz 🚀")
  );

  if (phase==="done") {
    const pct = Math.round(score/qs.length*100);
    const msg = pct>=80?"Excellent! ماشاء الله 🌟":pct>=60?"Good effort! Keep learning 📚":"Keep practising! الله يبارك فيك 💪";
    return e("div",{style:{textAlign:"center",padding:"16px 0"}},
      e("p",{style:{fontSize:48,margin:"0 0 8px"}},"🏆"),
      e("h3",{style:{fontSize:22,fontWeight:800,color:IP.purple,marginBottom:4}},
        `${score} / ${qs.length}`),
      e("p",{style:{fontSize:14,color:"#6b7280",marginBottom:8}},`${pct}% correct`),
      e("p",{style:{fontSize:15,color:IP.navy,fontWeight:700,marginBottom:24}},msg),
      e("button",{onClick:start,
        style:{padding:"12px 28px",background:IP.purple,color:"#fff",border:"none",
          borderRadius:14,fontSize:14,fontWeight:700,cursor:"pointer",marginRight:8}},
        "Try Again"),
    );
  }

  const q = qs[idx];
  return e("div",null,
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
      e("span",{style:{fontSize:13,color:"#6b7280",fontWeight:700}},`Question ${idx+1}/${qs.length}`),
      e("span",{style:{fontSize:13,color:IP.purple,fontWeight:700}},`Score: ${score}`)
    ),
    e("div",{style:{background:"#fff",border:"1.5px solid #e5e7eb",borderRadius:16,padding:20,marginBottom:16}},
      e("p",{style:{fontSize:16,fontWeight:700,color:IP.navy,margin:0,lineHeight:1.5}},q.q)
    ),
    e("div",{style:{display:"flex",flexDirection:"column",gap:10}},
      q.options.map((opt,i)=>{
        let bg="#fff",border="1.5px solid #e5e7eb",color="#374151";
        if (answered) {
          if (i===q.a) { bg=IP.greenL; border="2px solid "+IP.green; color=IP.greenD; }
          else if (i===chosen&&i!==q.a) { bg="#fee2e2"; border="2px solid #ef4444"; color="#b91c1c"; }
        } else if (chosen===i) { bg=IP.purpleL; border="2px solid "+IP.purple; color=IP.purple; }
        return e("button",{key:i,onClick:()=>pick(i),
          style:{padding:"14px 16px",borderRadius:14,border,background:bg,color,
            fontSize:14,fontWeight:600,textAlign:"left",cursor:"pointer",transition:"all .15s"}},
          opt);
      })
    ),
    answered && e("button",{onClick:next,
      style:{marginTop:16,width:"100%",padding:"13px",background:IP.purple,color:"#fff",
        border:"none",borderRadius:14,fontSize:15,fontWeight:700,cursor:"pointer"}},
      idx>=qs.length-1?"See Results →":"Next Question →")
  );
}

// ── Vocabulary quiz game ──────────────────────────────────────────────────────
function VocabQuizGame({ pack, onFinish }) {
  const [qi, setQi] = useState(0);
  const [sel, setSel] = useState(null);
  const [correct, setCorrect] = useState(0);

  const q = pack.quiz[qi];

  const handleAnswer = idx => {
    if (sel !== null) return;
    setSel(idx);
    if (idx === q.ans) setCorrect(c=>c+1);
    setTimeout(()=>{
      if (qi+1 < pack.quiz.length) { setSel(null); setQi(i=>i+1); }
      else onFinish(((idx===q.ans?correct+1:correct)/pack.quiz.length)*100);
    }, 900);
  };

  if (qi >= pack.quiz.length) return null;

  return e("div",{style:{padding:"16px 0"}},
    e("div",{style:{display:"flex", gap:8, marginBottom:16, justifyContent:"center"}},
      pack.quiz.map((_,i)=>
        e("div",{key:i,style:{
          width:10,height:10,borderRadius:"50%",
          background: i<qi ? pack.color : i===qi ? pack.color+"cc" : "#e5e7eb"
        }})
      )
    ),
    e("div",{style:{
      background:`linear-gradient(135deg,${pack.bg},#fff)`,
      borderRadius:20, padding:"24px 20px", marginBottom:18,
      border:`1.5px solid ${pack.color}44`, textAlign:"center"
    }},
      e("p",{style:{...AF, fontSize:20, fontWeight:700, color:"#1f2937", direction:"rtl", margin:0, lineHeight:1.6}}, q.q)
    ),
    e("div",{style:{display:"flex", flexDirection:"column", gap:10}},
      q.opts.map((opt,i)=>{
        let bg="#fff", border=`2px solid #e5e7eb`, col="#374151";
        if (sel!==null) {
          if (i===q.ans) { bg="#dcfce7"; border=`2px solid #86efac`; col="#15803d"; }
          else if (i===sel && i!==q.ans) { bg="#fee2e2"; border=`2px solid #fca5a5`; col="#dc2626"; }
        }
        return e("button",{key:i, onClick:()=>handleAnswer(i),
          style:{...AF, background:bg, border, color:col, borderRadius:14, padding:"14px 18px",
            fontSize:18, fontWeight:700, direction:"rtl", textAlign:"center", cursor:"pointer",
            animation: sel!==null&&i===q.ans ? "correctFlash .5s ease" : sel===i&&i!==q.ans ? "wrongShake .4s ease" : "none"}},
          opt
        );
      })
    )
  );
}

// ── Grammar topic quiz game ───────────────────────────────────────────────────
function GrammarTopicGame({ topic, onFinish }) {
  const [idx,setIdx]     = useState(0);
  const [chosen,setChosen]= useState(null);
  const [score,setScore] = useState(0);
  const [done,setDone]   = useState(false);
  const qs = topic.quiz;
  const q  = qs[idx];

  function pick(i) {
    if (chosen !== null) return;
    setChosen(i);
    if (i === q.answer) setScore(s => s+1);
  }

  function next() {
    if (idx+1 < qs.length) { setIdx(i=>i+1); setChosen(null); }
    else setDone(true);
  }

  if (done) {
    const pct = Math.round(score/qs.length*100);
    return e("div",{className:"pop",style:{textAlign:"center",padding:"28px 0"}},
      e("div",{className:"star-pop",style:{fontSize:80,marginBottom:10}},
        pct>=80?"🏆":pct>=50?"⭐":"💪"),
      e("h3",{style:{...AF,fontSize:26,fontWeight:900,color:topic.color,direction:"rtl",marginBottom:8}},
        pct>=80?"مَمْتَاز! أَنْتَ نَجْم! 🌟":pct>=50?"جَيِّدٌ جِدًّا! 👍":"اِسْتَمِرَّ فِي التَّدْرِيب! 💪"),
      e("p",{style:{fontSize:16,color:P.gray,marginBottom:28}},`${score} من ${qs.length} صحيح (${pct}%)`),
      e("button",{onClick:()=>onFinish(pct),
        style:{background:`linear-gradient(135deg,${topic.color},#1e40af)`,color:"#fff",border:"none",
          borderRadius:16,padding:"16px 36px",fontSize:17,fontWeight:900,
          boxShadow:`0 6px 24px ${topic.color}60`}},
        "التَّالِي ✨")
    );
  }

  const questionText = q.question || q.sentence || q.word || "";
  const hint = q.hint || "";

  return e("div",{className:"slide"},
    // progress
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
      e("span",{style:{fontSize:13,color:P.gray,fontWeight:700}},`${idx+1} / ${qs.length}`),
      e("div",{style:{display:"flex",gap:5}},
        ...qs.map((_,i)=>e("div",{key:i,style:{width:9,height:9,borderRadius:"50%",
          background:i<idx?topic.color:i===idx?"#f97316":"#e5e7eb"}}))
      ),
      e("span",{style:{fontSize:13,color:topic.color,fontWeight:700}},`⭐ ${score}`)
    ),
    // question card
    e("div",{style:{background:`linear-gradient(135deg,${topic.bg},#fff)`,borderRadius:20,
      padding:24,marginBottom:20,border:`2px solid ${topic.color}30`,
      boxShadow:`0 4px 16px ${topic.color}18`}},
      e("p",{style:{...AF,fontSize:22,fontWeight:800,color:"#1c1917",direction:"rtl",
        lineHeight:1.9,margin:0,textAlign:"center"}},questionText)
    ),
    // feedback hint (shown after answering)
    chosen !== null && e("div",{className:"pop",style:{
      background:chosen===q.answer?"#dcfce7":"#fee2e2",
      border:`2px solid ${chosen===q.answer?"#22c55e":"#ef4444"}`,
      borderRadius:14,padding:"10px 18px",marginBottom:14,
      display:"flex",alignItems:"center",gap:10,direction:"rtl"}},
      e("span",{style:{fontSize:24}},chosen===q.answer?"🎉":"💡"),
      e("span",{style:{...AF,fontSize:16,fontWeight:800,
        color:chosen===q.answer?"#15803d":"#991b1b"}},
        chosen===q.answer?"صَحّ! أَحْسَنْت!":hint)
    ),
    // options
    e("div",{style:{display:"flex",flexDirection:"column",gap:12}},
      ...q.options.map((opt,i)=>{
        let bg="#fff",border="2px solid #e5e7eb",color="#1c1917",shadow="0 2px 8px rgba(0,0,0,.06)";
        if (chosen !== null) {
          if (i===q.answer){bg="#dcfce7";border=`2px solid #22c55e`;color="#15803d";shadow="0 4px 12px rgba(34,197,94,.2)";}
          else if (i===chosen){bg="#fee2e2";border="2px solid #ef4444";color="#991b1b";shadow="none";}
        }
        return e("button",{key:i,onClick:()=>pick(i),
          style:{...AF,background:bg,border,borderRadius:16,padding:"16px 20px",fontSize:20,
            direction:"rtl",textAlign:"right",cursor:chosen===null?"pointer":"default",
            color,fontWeight:700,display:"flex",alignItems:"center",gap:12,
            boxShadow:shadow,transition:"background .2s, border .2s"}},
          chosen!==null&&i===q.answer&&e("span",{style:{fontSize:20}},"✅"),
          chosen!==null&&i===chosen&&i!==q.answer&&e("span",{style:{fontSize:20}},"❌"),
          opt
        );
      })
    ),
    chosen!==null && e("button",{onClick:next,
      style:{width:"100%",marginTop:18,background:`linear-gradient(135deg,${topic.color},#1e40af)`,
        color:"#fff",border:"none",borderRadius:16,padding:"16px 0",fontSize:17,fontWeight:900,
        boxShadow:`0 6px 24px ${topic.color}50`}},
      idx+1<qs.length?"السُّؤَالُ التَّالِي ←":"اعْرِضِ النَّتِيجَة 🎯")
  );
}

    e("div",{style:{padding:"14px 14px 100px",display:"flex",flexDirection:"column",gap:14}},
      ...GRAMMAR_TOPICS.map((topic,i)=>
        e("button",{key:topic.id,onClick:()=>setSel(i),
          style:{background:"#fff",borderRadius:22,padding:"18px 18px 16px",cursor:"pointer",
            textAlign:"right",display:"flex",alignItems:"center",gap:14,
            border:`2px solid ${topic.color}20`,
            borderLeft:`6px solid ${topic.color}`,
            boxShadow:`0 4px 18px ${topic.color}15`,
            transition:"transform .12s, box-shadow .12s"}},
          e("div",{style:{width:64,height:64,borderRadius:18,background:topic.bg,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,
            flexShrink:0,boxShadow:`0 4px 12px ${topic.color}25`,
            border:`2px solid ${topic.color}20`}},topic.emoji),
          e("div",{style:{flex:1,minWidth:0}},
            e("p",{style:{...AF,fontSize:20,fontWeight:900,color:topic.color,
              direction:"rtl",margin:"0 0 4px"}},topic.title),
            e("p",{style:{fontSize:12,color:"#6b7280",margin:"0 0 6px",fontWeight:700}},
              topic.titleEn),
            e("p",{style:{...AF,fontSize:13,color:"#78350f",direction:"rtl",margin:0,
              lineHeight:1.5}},topic.tagline)
          ),
          e("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flexShrink:0}},
            e("span",{style:{fontSize:22,color:topic.color}},"›"),
            e("span",{style:{fontSize:10,color:P.gray,fontWeight:700}},`${topic.quiz.length} سؤال`)
          )
        )
      )
    )
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  const { lessons, banks, loaded } = useContent();
  const [progress, setProgress]    = useState(loadP);
  const [screen, setScreen]        = useState("home");
  const [activeLessonId, setALId]  = useState(null);
  const [activeDrillKey, setADKey] = useState(null);
  const [printLessonId, setPLId]   = useState(null);
  const [tab, setTab]              = useState("arabic"); // "arabic" | "islamic"
  const lastDate = useRef(progress?.lastActiveDate||null);

  useEffect(()=>{
    const today=new Date().toISOString().slice(0,10);
    const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
    if(lastDate.current!==today){
      const ns=lastDate.current===yesterday?(progress?.streak||0)+1:1;
      const u={...progress,streak:ns,lastActiveDate:today};
      setProgress(u); saveP(u); lastDate.current=today;
    }
  },[]);

  const updateP = useCallback(updates=>{
    setProgress(prev=>{const n={...prev,...updates};saveP(n);return n;});
  },[]);

  const completeLesson = useCallback((id,quiz,gram)=>{
    updateP({lessons:{...(progress?.lessons||{}),[id]:{quiz,grammar:gram,date:new Date().toISOString()}}});
    setScreen("home");
  },[progress,updateP]);

  const completeDrill = useCallback((bankKey,correct,total,wrongMap)=>{
    const prev=progress?.drillStats?.[bankKey]||{attempts:0,correct:0};
    const pw=progress?.drillWrong?.[bankKey]||{};
    const nw={...pw};
    Object.entries(wrongMap).forEach(([w,c])=>{nw[w]=(nw[w]||0)+c;});
    updateP({
      drillStats:{...(progress?.drillStats||{}),[bankKey]:{attempts:prev.attempts+total,correct:prev.correct+correct}},
      drillWrong:{...(progress?.drillWrong||{}),[bankKey]:nw},
    });
    setScreen("drill-picker");
  },[progress,updateP]);

  const al = lessons.find(l=>l.id===activeLessonId);
  const pl = lessons.find(l=>l.id===printLessonId);

  if(screen==="print"&&pl)
    return e(PrintView,{lesson:pl,onClose:()=>{setPLId(null);setScreen("home");}});

  if(screen==="print-all")
    return e(PrintAllView,{lessons,onClose:()=>setScreen("home")});

  // Bottom nav (mobile only — hidden on desktop via CSS)
  const BottomNav = e("div",{className:"bottom-nav-bar",style:{
    position:"fixed",bottom:0,left:0,right:0,zIndex:50,
    display:"flex",borderTop:"2px solid #fed7aa",
    background:"#fff",boxShadow:"0 -4px 16px rgba(249,115,22,.12)"
  }},
    e("button",{onClick:()=>{setTab("arabic");setScreen("home");},style:{
      flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,
      padding:"10px 0 14px",background:"none",border:"none",cursor:"pointer",
      color:tab==="arabic"?"#f97316":"#9ca3af",fontWeight:800,fontSize:11
    }},
      e("span",{style:{fontSize:26}},"📖"),
      "عَرَبِيَّة"
    ),
    e("button",{onClick:()=>setTab("vocab"),style:{
      flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,
      padding:"10px 0 14px",background:"none",border:"none",cursor:"pointer",
      color:tab==="vocab"?VP.pink:"#9ca3af",fontWeight:800,fontSize:11
    }},
      e("span",{style:{fontSize:22}},"📚"),
      "مُفْرَدَات"
    ),
    e("button",{onClick:()=>setTab("grammar"),style:{
      flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,
      padding:"10px 0 14px",background:"none",border:"none",cursor:"pointer",
      color:tab==="grammar"?GP.blue:"#9ca3af",fontWeight:800,fontSize:11
    }},
      e("span",{style:{fontSize:22}},"📐"),
      "قَوَاعِد"
    ),
    e("button",{onClick:()=>setTab("islamic"),style:{
      flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,
      padding:"10px 0 14px",background:"none",border:"none",cursor:"pointer",
      color:tab==="islamic"?IP.green:"#9ca3af",fontWeight:800,fontSize:11
    }},
      e("span",{style:{fontSize:22}},"🌙"),
      "إِسْلَامِيَّات"
    )
  );

  // Sidebar nav (desktop only — shown via CSS)
  const isArabic = tab === "arabic";
  const SidebarNav = e("div",{className:"sidebar-nav"},
    e("div",{className:"nav-logo"},"📖 عَرَبِيَّة"),
    e("button",{className:isArabic&&screen==="home"?"active":"",
      onClick:()=>{setTab("arabic");setScreen("home");}},
      e("span",{className:"nav-icon"},"🏠"), "الرَّئِيسِيَّة"),
    e("button",{className:isArabic&&screen==="drill-picker"?"active":"",
      onClick:()=>{setTab("arabic");setScreen("drill-picker");}},
      e("span",{className:"nav-icon"},"⚡"), "التَّدْرِيب"),
    e("button",{className:isArabic&&screen==="dashboard"?"active":"",
      onClick:()=>{setTab("arabic");setScreen("dashboard");}},
      e("span",{className:"nav-icon"},"📊"), "تَقَدُّمِي"),
    e("button",{className:tab==="vocab"?"active":"",
      onClick:()=>setTab("vocab"),
      style:tab==="vocab"?{background:"linear-gradient(135deg,#fce7f3,#ede9fe)",color:VP.pink,boxShadow:"0 2px 8px rgba(219,39,119,.2)"}:{}},
      e("span",{className:"nav-icon"},"📚"), "المُفْرَدَات"),
    e("button",{className:tab==="grammar"?"active":"",
      onClick:()=>setTab("grammar"),
      style:tab==="grammar"?{background:"linear-gradient(135deg,#dbeafe,#ede9fe)",color:GP.blue,boxShadow:"0 2px 8px rgba(29,78,216,.2)"}:{}},
      e("span",{className:"nav-icon"},"📐"), "القَوَاعِد"),
    e("button",{className:tab==="islamic"?"active":"",
      onClick:()=>setTab("islamic")},
      e("span",{className:"nav-icon"},"🌙"), "الإِسْلَامِيَّات"),
    e("div",{style:{flex:1}}),
    e("button",{onClick:()=>setScreen("print-all"),
      style:{background:"#f0fdf4",color:P.greenD,borderRadius:12}},
      e("span",{className:"nav-icon"},I.printer(18,P.greenD)), "طباعة الكُلّ")
  );

  if (tab==="vocab") return e("div",{className:"app-shell"},
    SidebarNav,
    e("div",{className:"content-area",style:{padding:"0 0 80px"}},
      e(VocabSection,{onHome:()=>{setTab("arabic");setScreen("home");}})
    ),
    BottomNav
  );

  if (tab==="grammar") return e("div",{className:"app-shell"},
    SidebarNav,
    e("div",{className:"content-area",style:{padding:"0 0 80px"}},
      e(GrammarSection,{onHome:()=>{setTab("arabic");setScreen("home");}})
    ),
    BottomNav
  );

  if (tab==="islamic") return e("div",{className:"app-shell"},
    SidebarNav,
    e("div",{className:"content-area",style:{padding:"16px 14px 80px"}},
      e(IslamicStudies,{onHome:()=>{setTab("arabic");setScreen("home");}})
    ),
    BottomNav
  );

  return e("div",{className:"app-shell",style:{background:"#fff8f0"}},
    SidebarNav,
    e("div",{className:"content-area"},
      e("div",{style:{maxWidth:700,margin:"0 auto",padding:"0 0 80px"}},
        screen==="home" && e(HomeScreen,{
          lessons, banks, progress, contentLoaded:loaded,
          onLesson:id=>{setALId(id);setScreen("lesson");},
          onDrill:()=>setScreen("drill-picker"),
          onDashboard:()=>setScreen("dashboard"),
          onPrint:id=>{setPLId(id);setScreen("print");},
          onPrintAll:()=>setScreen("print-all"),
          onGrammar:()=>setTab("grammar"),
          onVocab:()=>setTab("vocab"),
        }),
        screen==="lesson"&&al && e("div",null,
          e(LessonFlow,{lesson:al,onComplete:completeLesson,onBack:()=>setScreen("home")}),
          e("button",{onClick:()=>{setPLId(activeLessonId);setScreen("print");},
            style:{marginTop:16,width:"100%",background:"#fff",color:P.gray,
              border:"2px solid #e5e7eb",borderRadius:12,padding:"11px 0",fontSize:13,
              display:"flex",alignItems:"center",justifyContent:"center",gap:6}},
            I.printer(14,P.gray)," Parent / Print View")
        ),
        screen==="drill-picker" && e(DrillPicker,{
          banks, progress,
          onStart:key=>{setADKey(key);setScreen("drill-session");},
          onBack:()=>setScreen("home"),
        }),
        screen==="drill-session"&&activeDrillKey && e(DrillSession,{
          bankKey:activeDrillKey, banks, progress,
          onFinish:(c,t,w)=>completeDrill(activeDrillKey,c,t,w),
          onHome:()=>setScreen("home"),
        }),
        screen==="dashboard" && e(Dashboard,{lessons,banks,progress,onBack:()=>setScreen("home")})
      )
    ),
    BottomNav
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App,null));
</script>
</body>
</html>
