<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Little Stars Learning 🌟</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --sky:#87CEEB;--peach:#FFCBA4;--mint:#B5EAD7;--gold:#FFD166;--cream:#FFFDF7;
  --navy:#1B3A5C;--night:#0D1B3E;--star:#FFE57A;--lantern:#FF8C42;
  --meadow:#C8F0C0;--coral:#FF6B6B;--lilac:#C3B1E1;--rose:#FFB3C6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Fredoka One',sans-serif;background:var(--cream);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;user-select:none;}
#root{min-height:100vh;}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes bounce{0%,100%{transform:scale(1)}30%{transform:scale(1.25)}60%{transform:scale(0.92)}80%{transform:scale(1.08)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.55}}
@keyframes sparkle{0%{transform:scale(0)rotate(0deg);opacity:0}50%{transform:scale(1.4)rotate(180deg);opacity:1}100%{transform:scale(1)rotate(360deg);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes wobble{0%,100%{transform:rotate(0)}20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-5deg)}80%{transform:rotate(5deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(255,209,102,.4)}50%{box-shadow:0 0 35px rgba(255,209,102,.95),0 0 60px rgba(255,180,50,.5)}}
@keyframes starTwinkle{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes cloudDrift{0%{transform:translateX(-10px)}100%{transform:translateX(10px)}}
@keyframes correctPop{0%{transform:scale(1)}40%{transform:scale(1.35)}70%{transform:scale(.9)}100%{transform:scale(1)}}
@keyframes stickerDrop{0%{transform:scale(0)rotate(-20deg);opacity:0}60%{transform:scale(1.3)rotate(5deg);opacity:1}100%{transform:scale(1)rotate(0deg);opacity:1}}
@keyframes radialGlow{0%{box-shadow:0 0 0 0 rgba(255,209,102,.7)}100%{box-shadow:0 0 0 40px rgba(255,209,102,0)}}
@keyframes moonGlow{0%,100%{filter:drop-shadow(0 0 8px rgba(255,229,122,.5))}50%{filter:drop-shadow(0 0 20px rgba(255,229,122,.9))}}
@keyframes popIn{0%{transform:scale(0);opacity:0}80%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

.screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px;animation:fadeIn .3s ease forwards;position:relative;overflow:hidden;}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;min-width:88px;min-height:88px;border:none;border-radius:24px;cursor:pointer;font-family:'Fredoka One',sans-serif;font-size:22px;color:var(--navy);transition:transform .12s cubic-bezier(.34,1.56,.64,1);outline:none;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(.88)!important;}
.btn:focus-visible{outline:3px solid var(--navy);outline-offset:3px;}
.btn-primary{background:linear-gradient(135deg,var(--gold),#FFB300);box-shadow:0 6px 0 #B8800A,0 8px 20px rgba(0,0,0,.18);}
.btn-soft{background:#fff;box-shadow:0 5px 0 #C8C8C8,0 6px 18px rgba(0,0,0,.12);}
.back-btn{position:fixed;top:16px;left:16px;width:56px;height:56px;min-width:56px;min-height:56px;border-radius:50%;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);box-shadow:0 4px 16px rgba(0,0,0,.15);font-size:24px;z-index:100;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s;}
.back-btn:active{transform:scale(.88);}
.sticker-tray-btn{position:fixed;top:16px;right:16px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#FFB300);box-shadow:0 4px 12px rgba(0,0,0,.2);font-size:26px;z-index:100;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;animation:glow 2.5s ease-in-out infinite;transition:transform .15s;}
.sticker-tray-btn:active{transform:scale(.88);}
.next-btn{background:linear-gradient(135deg,var(--gold),#FFB300);border-radius:20px;padding:12px 28px;font-size:18px;font-family:'Fredoka One',sans-serif;color:var(--navy);border:none;cursor:pointer;box-shadow:0 4px 0 #B8800A,0 6px 16px rgba(0,0,0,.15);transition:transform .12s cubic-bezier(.34,1.56,.64,1);min-height:52px;margin-top:12px;min-width:140px;}
.next-btn:active{transform:scale(.88);}
.say-it-btn{background:linear-gradient(135deg,#C3B1E1,#9B7FD4);border-radius:20px;padding:12px 24px;font-size:17px;font-family:'Fredoka One',sans-serif;color:#fff;border:none;cursor:pointer;box-shadow:0 4px 0 #6a4fa0,0 6px 16px rgba(0,0,0,.18);transition:transform .12s cubic-bezier(.34,1.56,.64,1);min-height:48px;margin-top:10px;}
.say-it-btn:active{transform:scale(.88);}

/* home */
.home-bg{background:linear-gradient(180deg,#C9E8FF 0%,#A8D8F0 40%,#B5EAD7 100%);}
.home-title{font-size:clamp(26px,8vw,46px);color:var(--navy);text-align:center;margin-top:36px;text-shadow:0 3px 0 rgba(255,255,255,.7);line-height:1.2;}
.home-subtitle{font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;color:#3a6080;margin-top:6px;text-align:center;}
.door-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:28px;width:100%;max-width:480px;}
.door-card{border-radius:32px;padding:24px 14px 20px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;border:none;transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s;min-height:190px;position:relative;overflow:hidden;font-family:'Fredoka One',sans-serif;}
.door-card:active{transform:scale(.93)!important;}
.door-card:hover{transform:translateY(-6px)scale(1.02);}
.door-arabic{background:linear-gradient(160deg,#1a2a6c 0%,#2d1b69 60%,#0D1B3E 100%);box-shadow:0 10px 0 #0a1230,0 16px 40px rgba(13,27,62,.45);color:var(--star);}
.door-math{background:linear-gradient(160deg,#56ab2f 0%,#a8e063 100%);box-shadow:0 10px 0 #3a7a1e,0 16px 40px rgba(56,171,47,.35);color:var(--navy);}
.door-mascot{font-size:52px;animation:float 3s ease-in-out infinite;}
.door-label{font-size:20px;text-align:center;line-height:1.2;}
.door-sub{font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;opacity:.8;text-align:center;}
.star-deco{position:absolute;font-size:14px;animation:starTwinkle 2s ease-in-out infinite;}
.cloud-deco{position:absolute;font-size:28px;opacity:.7;animation:cloudDrift 4s ease-in-out infinite alternate;}

/* arabic world */
.arabic-bg{background:radial-gradient(ellipse at 50% 0%,#1a3a7c 0%,var(--night) 70%);color:var(--cream);}
.math-bg{background:linear-gradient(180deg,#d4f5e9 0%,#c8f0c0 40%,#e8f8b0 100%);}
.world-title{font-size:24px;margin-top:68px;text-align:center;}
.arabic-world-title{color:var(--star);}
.math-world-title{color:var(--navy);}
.session-timer{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border-radius:20px;padding:6px 14px;font-size:13px;font-family:'Nunito',sans-serif;margin-top:68px;color:rgba(255,255,255,.75);}
.math-session-timer{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.55);border-radius:20px;padding:6px 14px;font-size:13px;font-family:'Nunito',sans-serif;margin-top:68px;color:var(--navy);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.timer-track{width:60px;height:10px;background:rgba(255,255,255,.15);border-radius:10px;overflow:hidden;}
.timer-fill-moon{height:100%;background:linear-gradient(90deg,var(--star),var(--lantern));border-radius:10px;transition:width 1s linear;}
.timer-track-sun{width:60px;height:10px;background:rgba(0,0,0,.12);border-radius:10px;overflow:hidden;}
.timer-fill-sun{height:100%;background:linear-gradient(90deg,#FFD700,#FF8C00);border-radius:10px;transition:width 1s linear;}
.arabic-letter-card{background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.05));border:2px solid rgba(255,229,122,.3);border-radius:36px;padding:24px 20px;text-align:center;width:100%;max-width:400px;margin-top:12px;backdrop-filter:blur(10px);}
.arabic-letter-big{font-size:clamp(76px,20vw,120px);line-height:1;color:var(--star);font-family:'Nunito',sans-serif;font-weight:900;text-shadow:0 0 30px rgba(255,229,122,.6);animation:moonGlow 2s ease-in-out infinite;direction:rtl;display:block;margin:6px auto;}
.letter-word-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;flex-wrap:wrap;}
.letter-word{font-size:19px;font-family:'Nunito',sans-serif;direction:rtl;color:rgba(255,255,255,.9);}
.letter-emoji{font-size:30px;}
.mouth-hint{display:inline-block;background:rgba(255,255,255,.12);border-radius:12px;padding:5px 12px;font-size:12px;font-family:'Nunito',sans-serif;color:rgba(255,255,255,.7);margin-top:8px;}
.sound-wave{display:flex;gap:4px;align-items:center;justify-content:center;height:28px;}
.wave-bar{width:5px;background:var(--star);border-radius:3px;animation:pulse .6s ease-in-out infinite;}
.trace-container{position:relative;margin:14px auto 0;width:200px;height:200px;}
.trace-label-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:130px;color:rgba(255,229,122,.08);font-family:'Nunito',sans-serif;font-weight:900;direction:rtl;pointer-events:none;z-index:0;}
.trace-canvas{position:absolute;inset:0;z-index:1;border-radius:20px;border:2px dashed rgba(255,229,122,.4);cursor:crosshair;touch-action:none;}
.recall-choices{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
.recall-letter-btn{width:100px;height:100px;border-radius:24px;background:rgba(255,255,255,.1);border:2px solid rgba(255,229,122,.25);font-size:56px;font-family:'Nunito',sans-serif;font-weight:900;color:var(--star);direction:rtl;cursor:pointer;transition:transform .15s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;justify-content:center;}
.recall-letter-btn:active{transform:scale(.88);}
.recall-letter-btn.correct{background:rgba(181,234,215,.3);border-color:var(--mint);animation:correctPop .5s ease forwards;}
.recall-letter-btn.tapped{animation:wobble .4s ease;background:rgba(255,255,255,.18);}
.play-sound-btn{background:linear-gradient(135deg,var(--star),var(--lantern));border-radius:50%;width:60px;height:60px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;font-size:26px;margin:10px auto 0;box-shadow:0 5px 0 #B85A00,0 8px 20px rgba(0,0,0,.25);transition:transform .12s cubic-bezier(.34,1.56,.64,1);}
.play-sound-btn:active{transform:scale(.85);}
.progress-dots{display:flex;gap:8px;justify-content:center;margin-top:12px;}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.25);transition:background .3s;}
.dot.done{background:var(--star);}
.dot.active{background:rgba(255,255,255,.7);transform:scale(1.3);}
.math-progress-dots .dot{background:rgba(27,58,92,.2);}
.math-progress-dots .dot.done{background:var(--navy);}
.math-progress-dots .dot.active{background:rgba(27,58,92,.55);}
.step-label{font-family:'Nunito',sans-serif;font-size:13px;opacity:.65;text-align:center;margin-top:5px;}
.info-chip{display:inline-block;background:rgba(255,255,255,.12);border-radius:20px;padding:5px 14px;font-size:13px;font-family:'Nunito',sans-serif;margin-top:5px;}
.cpa-label{font-size:11px;font-family:'Nunito',sans-serif;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(27,58,92,.12);border-radius:12px;padding:3px 10px;color:var(--navy);display:inline-block;margin-bottom:6px;}
.instruction{font-family:'Nunito',sans-serif;font-weight:800;font-size:18px;text-align:center;color:var(--navy);line-height:1.3;margin-bottom:6px;}
.rest-banner{background:linear-gradient(135deg,#FFE57A,#FFD166);border-radius:28px;padding:24px 20px;text-align:center;animation:bounce .6s ease;width:100%;max-width:380px;margin-top:20px;box-shadow:0 6px 0 #B8800A,0 10px 24px rgba(0,0,0,.15);}

/* math modules grid */
.math-module-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;width:100%;max-width:440px;}
.math-module-btn{background:#fff;border-radius:22px;border:none;padding:18px 12px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;box-shadow:0 5px 0 #C5D5B0,0 8px 20px rgba(0,0,0,.1);transition:transform .15s cubic-bezier(.34,1.56,.64,1);font-family:'Fredoka One',sans-serif;color:var(--navy);min-height:105px;font-size:14px;text-align:center;line-height:1.2;}
.math-module-btn:active{transform:scale(.9)translateY(4px);box-shadow:0 1px 0 #C5D5B0;}
.math-module-btn .mod-icon{font-size:36px;}
.math-module-btn.wide{grid-column:span 2;}

/* counting */
.animal-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;min-height:100px;background:rgba(255,255,255,.6);border-radius:24px;padding:16px;margin:12px 0;}
.animal-emoji{font-size:42px;cursor:pointer;animation:popIn .35s cubic-bezier(.34,1.56,.64,1) forwards;}
.count-btn{width:100%;padding:16px;font-size:19px;border-radius:18px;background:linear-gradient(135deg,var(--mint),#7FD9B5);border:none;cursor:pointer;font-family:'Fredoka One',sans-serif;color:var(--navy);box-shadow:0 5px 0 #4EAD8A,0 8px 18px rgba(0,0,0,.1);transition:transform .12s cubic-bezier(.34,1.56,.64,1);min-height:80px;}
.count-btn:active{transform:scale(.92)translateY(4px);}
.numeral-display{font-size:80px;color:var(--navy);line-height:1;text-shadow:0 4px 0 rgba(0,0,0,.1);}
.numeral-display.pop{animation:bounce .5s ease;}

/* shapes */
.shape-drop-zone{border:3px dashed rgba(27,58,92,.3);border-radius:16px;width:100px;height:100px;display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s;}
.shape-drop-zone.over{background:rgba(181,234,215,.4);border-color:#4EAD8A;}
.shape-drop-zone.success{background:rgba(181,234,215,.5);border-color:var(--mint);animation:correctPop .5s ease;}
.shapes-choices{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
.shape-choice{background:#fff;border-radius:18px;width:84px;height:84px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 #D0D0D0,0 6px 14px rgba(0,0,0,.1);cursor:pointer;border:none;transition:transform .15s cubic-bezier(.34,1.56,.64,1);}
.shape-choice:active{transform:scale(.88);}
.shape-choice.correct{background:rgba(181,234,215,.6);animation:radialGlow .6s ease,correctPop .5s ease;}

/* patterns */
.pattern-row{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;background:rgba(255,255,255,.6);border-radius:22px;padding:16px;margin:12px 0;}
.pattern-item{font-size:40px;}
.pattern-blank{width:56px;height:56px;background:rgba(27,58,92,.08);border-radius:14px;border:3px dashed rgba(27,58,92,.25);display:flex;align-items:center;justify-content:center;font-size:22px;color:rgba(27,58,92,.3);}
.pattern-choices{display:flex;gap:18px;justify-content:center;margin-top:14px;}
.pattern-choice{width:84px;height:84px;border-radius:18px;background:#fff;border:none;font-size:42px;cursor:pointer;box-shadow:0 4px 0 #D0D0D0,0 6px 14px rgba(0,0,0,.1);transition:transform .15s cubic-bezier(.34,1.56,.64,1);}
.pattern-choice:active{transform:scale(.88);}
.pattern-choice.correct{background:rgba(181,234,215,.6);animation:radialGlow .6s ease,correctPop .5s ease;}
.pattern-choice.tapped{animation:wobble .4s ease;}

/* size */
.size-question{font-family:'Nunito',sans-serif;font-weight:800;font-size:19px;color:var(--navy);margin:10px 0 18px;line-height:1.3;text-align:center;}
.size-choices{display:flex;gap:16px;justify-content:center;align-items:flex-end;flex-wrap:wrap;}
.size-choice{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;background:rgba(255,255,255,.65);border-radius:22px;padding:14px;border:3px solid transparent;min-width:110px;min-height:88px;transition:transform .15s cubic-bezier(.34,1.56,.64,1),border-color .2s;font-family:'Nunito',sans-serif;font-weight:800;color:var(--navy);font-size:13px;}
.size-choice:active{transform:scale(.9);}
.size-choice.correct{border-color:#4EAD8A;background:rgba(181,234,215,.5);animation:correctPop .5s ease;}
.size-choice.tapped{animation:wobble .4s ease;}

/* color sort */
.sort-items-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;background:rgba(255,255,255,.6);border-radius:22px;padding:14px;margin:10px 0;}
.sort-item{font-size:38px;cursor:pointer;transition:transform .15s;border:3px solid transparent;border-radius:12px;padding:4px;}
.sort-item.selected{border-color:var(--navy);transform:scale(1.2);background:rgba(27,58,92,.1);}
.sort-buckets{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
.sort-bucket{width:84px;min-height:84px;border-radius:18px;border:3px dashed rgba(27,58,92,.25);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:transform .15s,border-color .2s;padding:6px;font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;color:var(--navy);}
.sort-bucket:active{transform:scale(.92);}
.sort-bucket.lit{border-color:var(--gold);background:rgba(255,209,102,.15);}
.sorted-emoji{font-size:20px;}

/* addition */
.addition-row{display:flex;align-items:center;gap:12px;justify-content:center;background:rgba(255,255,255,.65);border-radius:24px;padding:18px;margin:12px 0;flex-wrap:wrap;}
.add-group{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:10px;min-width:60px;}
.add-emoji{font-size:34px;animation:popIn .3s ease forwards;}
.add-op{font-size:36px;color:var(--navy);font-weight:900;}
.add-answer-choices{display:flex;gap:16px;justify-content:center;margin-top:12px;flex-wrap:wrap;}
.add-choice{width:84px;height:84px;border-radius:20px;background:#fff;border:none;font-size:34px;font-family:'Fredoka One',sans-serif;color:var(--navy);cursor:pointer;box-shadow:0 4px 0 #D0D0D0,0 6px 14px rgba(0,0,0,.1);transition:transform .15s cubic-bezier(.34,1.56,.64,1);}
.add-choice:active{transform:scale(.88);}
.add-choice.correct{background:rgba(181,234,215,.6);animation:radialGlow .6s ease,correctPop .5s ease;}
.add-choice.tapped{animation:wobble .4s ease;}

/* number comparison */
.compare-row{display:flex;gap:20px;align-items:center;justify-content:center;margin:14px 0;flex-wrap:wrap;}
.compare-card{background:rgba(255,255,255,.65);border-radius:22px;padding:16px 20px;text-align:center;min-width:100px;cursor:pointer;border:3px solid transparent;transition:transform .15s cubic-bezier(.34,1.56,.64,1),border-color .2s;}
.compare-card:active{transform:scale(.9);}
.compare-card.correct{border-color:#4EAD8A;background:rgba(181,234,215,.4);animation:correctPop .5s ease;}
.compare-card.tapped{animation:wobble .4s ease;}
.compare-num{font-size:58px;color:var(--navy);}
.compare-emojis{font-size:22px;margin-top:4px;}

/* letter hunt */
.hunt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0;width:100%;max-width:340px;}
.hunt-cell{height:80px;border-radius:18px;background:rgba(255,255,255,.1);border:2px solid rgba(255,229,122,.2);display:flex;align-items:center;justify-content:center;font-size:48px;font-family:'Nunito',sans-serif;font-weight:900;color:var(--star);direction:rtl;cursor:pointer;transition:transform .15s cubic-bezier(.34,1.56,.64,1);}
.hunt-cell:active{transform:scale(.88);}
.hunt-cell.correct{background:rgba(181,234,215,.3);border-color:var(--mint);animation:correctPop .5s ease;}
.hunt-cell.wrong{animation:wobble .4s ease;}
.hunt-cell.disabled{opacity:.45;pointer-events:none;}

/* word builder */
.word-letters-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:12px 0;}

const STICKER_SLOTS=30;

/* ═══════════════════════════════════════
   AUDIO UNLOCK
   Browsers block speechSynthesis until a user gesture. On first tap anywhere,
   we fire a silent utterance to unlock the audio context for the session.
═══════════════════════════════════════ */
let _audioUnlocked=false;
let _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return _audioCtx;
}
function unlockAudio(){
  if(_audioUnlocked)return;
  _audioUnlocked=true;
  // Resume AudioContext (required by Chrome autoplay policy)
  try{const ctx=getAudioCtx();if(ctx.state==='suspended')ctx.resume();}catch(e){}
  // Pre-load voice list
  if(window.speechSynthesis){
    window.speechSynthesis.getVoices();
    // Silent utterance to mark speechSynthesis as user-activated
    const u=new SpeechSynthesisUtterance(' ');
    u.volume=0;u.rate=10;
    window.speechSynthesis.speak(u);
  }
}
document.addEventListener('pointerdown',unlockAudio,{capture:true});

/* ═══════════════════════════════════════
   HOOKS
═══════════════════════════════════════ */
// Pick the warmest, most natural-sounding English voice available on this device
let _bestVoice=null;
function getBestVoice(){
  if(_bestVoice)return _bestVoice;
  const voices=window.speechSynthesis.getVoices();
  if(!voices.length)return null;
  // Priority list: neural / enhanced / well-known warm voices
  const priority=[
    v=>v.name==='Samantha',                      // iOS/macOS – very natural
    v=>v.name==='Karen',                          // iOS Australian – warm
    v=>v.name==='Moira',                          // macOS Irish
    v=>v.name==='Google US English',              // Chrome – much better than eSpeak
    v=>/natural|enhanced/i.test(v.name)&&/en[-_]US/i.test(v.lang),
    v=>/natural|enhanced/i.test(v.name)&&/en/i.test(v.lang),
    v=>/en[-_]US/i.test(v.lang)&&!/eSpeak|festival/i.test(v.name),
    v=>/en/i.test(v.lang),
  ];
  for(const test of priority){
    const found=voices.find(test);
    if(found){_bestVoice=found;return found;}
  }
  return null;
}

function useSpeedSpeech(){
  const speak=useCallback((text,lang='en-US',rate=0.8)=>{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    // Ensure AudioContext is resumed before speaking
    try{const ctx=getAudioCtx();if(ctx.state==='suspended')ctx.resume();}catch(e){}
    const fire=()=>{
      const u=new SpeechSynthesisUtterance(text);
      const v=getBestVoice();
      if(v&&/^en/i.test(lang))u.voice=v;
      u.lang=lang;u.rate=rate;u.pitch=1.05;u.volume=1;
      window.speechSynthesis.speak(u);
    };
    // If voices aren't loaded yet, wait for them then retry once
    if(!window.speechSynthesis.getVoices().length){
      const prev=window.speechSynthesis.onvoiceschanged;
      window.speechSynthesis.onvoiceschanged=()=>{_bestVoice=null;getBestVoice();if(prev)prev();fire();};
    } else {
      fire();
    }
  },[]);
  const speakRepeat=useCallback((text,lang,rate,times=3,delayMs=1200)=>{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    let i=0;
    const fire=()=>{
      if(i>=times)return;
      const u=new SpeechSynthesisUtterance(text);
      const v=getBestVoice();
      if(v&&/^en/i.test(lang))u.voice=v;
      u.lang=lang;u.rate=rate;u.pitch=1.05;u.volume=1;
      u.onend=()=>{i++;if(i<times)setTimeout(fire,delayMs);};
      window.speechSynthesis.speak(u);i++;
    };
    fire();
  },[]);
  // Warm up voice list on first call (voices load async)
  useEffect(()=>{
    if(window.speechSynthesis){
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged=()=>{_bestVoice=null;getBestVoice();};
    }
  },[]);
  return{speak,speakRepeat};
}

function useSessionTracker(worldKey){
  const sk=`ls_session_${worldKey}`;
  const[lettersSeen,setLettersSeen]=useState(()=>{try{return JSON.parse(localStorage.getItem(`${sk}_letters`)||'[]');}catch{return[];}});
  const[elapsed,setElapsed]=useState(0);
  const startRef=useRef(Date.now());
  useEffect(()=>{const id=setInterval(()=>setElapsed(Math.floor((Date.now()-startRef.current)/1000)),1000);return()=>clearInterval(id);},[]);
  const markLetterSeen=useCallback((letter)=>{
    setLettersSeen(prev=>{if(prev.includes(letter))return prev;const next=[...prev,letter];localStorage.setItem(`${sk}_letters`,JSON.stringify(next));return next;});
  },[sk]);
  const maxSecs=540;
  const progress=Math.min(elapsed/maxSecs,1);
  const showRest=elapsed>=maxSecs;
  return{elapsed,progress,showRest,lettersSeen,markLetterSeen};
}

function MiniCartoon({concept,onClose}){
  const script=CARTOON_SCRIPTS[concept];
  const slides=script?script.slides:[];
  const[idx,setIdx]=useState(0);
  const[slidePhase,setSlidePhase]=useState('active');
  const[barW,setBarW]=useState(0);
  const timerRef=useRef(null);
  const{speak}=useSpeedSpeech();

  const goTo=useCallback((nextIdx)=>{
    window.speechSynthesis&&window.speechSynthesis.cancel();
    setSlidePhase('out-left');
    setTimeout(()=>{
      setIdx(nextIdx);
      setSlidePhase('active');
      setBarW(0);
    },420);
  },[]);

  useEffect(()=>{
    if(!slides[idx])return;
    // small delay so slide animation finishes before speaking
    const tts=setTimeout(()=>speak(slides[idx].narrate,'en-US',0.65),300);
    setBarW(0);
    clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>{
      if(idx<slides.length-1)goTo(idx+1);
    },SLIDE_DURATION);
    requestAnimationFrame(()=>requestAnimationFrame(()=>setBarW(100)));
    return()=>{clearTimeout(timerRef.current);clearTimeout(tts);};
  },[idx]);// eslint-disable-line

  if(!script)return null;
  const slide=slides[idx];
  const isLast=idx===slides.length-1;

  return<div className="cartoon-overlay" role="dialog" aria-modal="true" aria-label={`Mini cartoon: ${script.title}`}
    onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="cartoon-modal">
      <div className="cartoon-header">
        <div className="cartoon-ep-title">🎬 {script.title}</div>
        <button className="cartoon-close" onClick={onClose} aria-label="Close cartoon">✕</button>
      </div>

      <div className="cartoon-stage" style={{background:script.bg}}>
        <div className={`cartoon-slide ${slidePhase}`}>
          <div className="cartoon-scene" aria-hidden="true">{slide.scene}</div>
          <div className="cartoon-bubble">
            <div className="cartoon-text">{slide.text}</div>
            {slide.sub&&<div className="cartoon-sub">{slide.sub}</div>}
          </div>
          {slide.demo&&<SlideDemo demo={slide.demo}/>}
        </div>
        <div className="cartoon-auto-bar" style={{width:`${barW}%`,transition:barW===0?'none':`width ${SLIDE_DURATION}ms linear`}}/>
      </div>

      <div className="cartoon-footer">
        <div className="cartoon-dots">
          {slides.map((_,i)=>(
            <div key={i} className={`cartoon-dot${i===idx?' active':i<idx?' done':''}`}
              role="button" aria-label={`Slide ${i+1}`} onClick={()=>i!==idx&&goTo(i)}/>
          ))}
        </div>
        <button className="cartoon-next-btn"
          onClick={()=>{if(isLast)onClose();else goTo(idx+1);}}
          aria-label={isLast?'Finish cartoon and practice':'Next slide'}>
          {isLast?'Let\'s Practice! 🎮':'Next ▶'}
        </button>
      </div>
    </div>
  </div>;
}

/* ═══════════════════════════════════════
   ARABIC WORLD — TRACE
═══════════════════════════════════════ */
function LetterTrace({letterData,onNext}){
  const canvasRef=useRef(null);
  const drawing=useRef(false);
  const[hasDrawn,setHasDrawn]=useState(false);
  const getPos=(e,c)=>{const r=c.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};};
  const startDraw=(e)=>{e.preventDefault();drawing.current=true;const c=canvasRef.current;const ctx=c.getContext('2d');const pos=getPos(e,c);ctx.beginPath();ctx.moveTo(pos.x,pos.y);};
  const draw=(e)=>{e.preventDefault();if(!drawing.current)return;setHasDrawn(true);const c=canvasRef.current;const ctx=c.getContext('2d');ctx.strokeStyle='#FFE57A';ctx.lineWidth=7;ctx.lineCap='round';const pos=getPos(e,c);ctx.lineTo(pos.x,pos.y);ctx.stroke();};
  const endDraw=()=>{drawing.current=false;};
  const clear=()=>{canvasRef.current.getContext('2d').clearRect(0,0,200,200);setHasDrawn(false);};
  return<div style={{textAlign:'center',width:'100%',maxWidth:400}}>
    <div style={{fontFamily:'Nunito',fontSize:13,color:'rgba(255,255,255,.65)',marginBottom:4}}>✏️ Trace with your finger!</div>
    <div className="trace-container">
      <div className="trace-label-bg" lang="ar">{letterData.letter}</div>
      <canvas ref={canvasRef} className="trace-canvas" width={200} height={200}
        onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw}
        onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw}
        aria-label={`Trace ${letterData.phoneme}`} role="img"/>
    </div>
    <div style={{fontFamily:'Nunito',fontSize:12,color:'rgba(255,255,255,.5)',marginTop:6}}>Draw over the dotted letter ✨</div>
    <div style={{display:'flex',gap:10,justifyContent:'center',marginTop:12}}>
      {hasDrawn&&<button className="btn btn-soft" style={{minWidth:52,minHeight:52,borderRadius:14,fontSize:18}} onClick={clear} aria-label="Clear canvas">🗑️</button>}
      <button className="next-btn" onClick={onNext} aria-label="Continue">{hasDrawn?'⭐ Done!':'Skip ➡️'}</button>
    </div>
  </div>;
}

function LetterRecall({letterData,allLetters,onCorrect}){
  const[tapped,setTapped]=useState(null);
  const[correct,setCorrect]=useState(null);
  const[locked,setLocked]=useState(false);
  const wrongLetter=useMemo(()=>{
    const others=allLetters.filter(l=>l.letter!==letterData.letter);
    return others[Math.floor(Math.random()*others.length)];
  },[letterData,allLetters]);
  const choices=useMemo(()=>{const p=[letterData,wrongLetter];return Math.random()>.5?p:[p[1],p[0]];},[letterData,wrongLetter]);
  const handle=(ch)=>{
    if(locked)return;setLocked(true);setTapped(ch.letter);
    if(ch.letter===letterData.letter){setCorrect(ch.letter);setTimeout(()=>onCorrect(),1600);}
    else{setTimeout(()=>{setLocked(false);setTapped(null);},900);}
  };
  return<div style={{textAlign:'center',width:'100%',maxWidth:400}}>
    <div style={{fontFamily:'Nunito',fontWeight:700,fontSize:19,color:'rgba(255,255,255,.9)',margin:'10px 0 18px'}}>👂 Tap the letter you hear!</div>

  </div>;
}

function LetterHunt({targetLetter,allLetters,onCorrect,onDone,roundsLeft}){
  const[cells,setCells]=useState(()=>{
    const pool=allLetters.filter(l=>l.letter!==targetLetter.letter);
    const wrong=pool.sort(()=>Math.random()-.5).slice(0,5);
    return[...wrong,targetLetter].sort(()=>Math.random()-.5);
  });
  const[tapped,setTapped]=useState(null);
  const[correct,setCorrect]=useState(null);
  const[locked,setLocked]=useState(false);
  const handle=(cell)=>{
    if(locked||correct)return;
    setLocked(true);setTapped(cell.letter);
    if(cell.letter===targetLetter.letter){setCorrect(cell.letter);setTimeout(onCorrect,1400);}
    else{setTimeout(()=>{setLocked(false);setTapped(null);},700);}
  };
  return<div style={{textAlign:'center',width:'100%',maxWidth:380}}>
    <div style={{fontFamily:'Nunito',fontWeight:700,fontSize:17,color:'rgba(255,255,255,.9)',margin:'8px 0 4px'}}>

    <div className="hunt-grid">
      {cells.map((cell,i)=>(
        <button key={i} className={`hunt-cell${correct===cell.letter?' correct':tapped===cell.letter&&correct!==cell.letter?' wrong':''}`}
          onClick={()=>handle(cell)} aria-label={`Letter ${cell.phoneme}`} lang="ar">{cell.letter}</button>
      ))}
    </div>
  </div>;
}

/* ═══════════════════════════════════════
   ARABIC WORLD — WORD BUILDER
═══════════════════════════════════════ */
function WordBuilder({wordData,onDone,speak}){
  const[placed,setPlaced]=useState([]);
  const[usedIdx,setUsedIdx]=useState([]);
  const[celebrate,setCelebrate]=useState(false);
  // Shuffled tiles
  const tiles=useMemo(()=>[...wordData.letters].sort(()=>Math.random()-.5),[wordData]);

  const handleTile=(i)=>{
    if(usedIdx.includes(i))return;
    const ch=tiles[i];
    const nextPlaced=[...placed,ch];
    setPlaced(nextPlaced);
    setUsedIdx(p=>[...p,i]);
    speak(ch,'ar-SA',0.7);
    if(nextPlaced.length===wordData.letters.length){
      // check if correct order
      const attempt=nextPlaced.join('');
      if(attempt===wordData.word){
        setCelebrate(true);
        speak(wordData.word,'ar-SA',0.7);
        setTimeout(()=>{setCelebrate(false);onDone();},2000);
      } else {
        // reset after pause
        setTimeout(()=>{setPlaced([]);setUsedIdx([]);},800);
      }
    }
  };
  return<div style={{textAlign:'center',width:'100%',maxWidth:380}}>
    <CelebrationBurst show={celebrate}/>
    <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:16,color:'rgba(255,255,255,.85)',marginBottom:6}}>
      Build the word: {wordData.emoji} {wordData.meaning}
    </div>
    <div className="word-display" aria-label={`Current word: ${placed.join('')}`}>
      {placed.length>0?placed.map((l,i)=><span key={i} lang="ar">{l}</span>):<span style={{opacity:.3,fontSize:24,direction:'ltr'}}>tap letters below</span>}
    </div>
    <div className="word-letters-row">
      {tiles.map((l,i)=>(
        <button key={i} className={`word-letter-btn${usedIdx.includes(i)?' used':''}`}
          onClick={()=>handleTile(i)} aria-label={`Tap letter ${l}`} lang="ar">{l}</button>
      ))}
    </div>
    {placed.length>0&&placed.length<wordData.letters.length&&(
      <button onClick={()=>{setPlaced([]);setUsedIdx([]);}} style={{marginTop:10,background:'rgba(255,255,255,.1)',border:'none',borderRadius:12,padding:'8px 16px',fontFamily:'Nunito',fontWeight:700,fontSize:13,color:'rgba(255,255,255,.6)',cursor:'pointer'}}>↺ Try again</button>
    )}
  </div>;
}

/* ═══════════════════════════════════════
   ARABIC WORLD — LETTER MATCH PAIRS
═══════════════════════════════════════ */
function LetterMatch({letters,onDone,speak}){
  // Match letter → emoji
  const pairs=useMemo(()=>letters.slice(0,4),[letters]);
  const[selected,setSelected]=useState(null);// {type:'letter'|'emoji', idx}
  const[matched,setMatched]=useState([]);// indices of matched pairs
  const[wrongFlash,setWrongFlash]=useState(null);

  const handleLetter=(idx)=>{
    if(matched.includes(idx))return;
    if(selected?.type==='letter'&&selected.idx===idx){setSelected(null);return;}
    setSelected({type:'letter',idx});
    speak(pairs[idx].phoneme,'ar-SA',0.7);
  };
  const handleEmoji=(idx)=>{
    if(matched.includes(idx))return;
    if(!selected||selected.type!=='letter'){setSelected({type:'emoji',idx});return;}
    if(selected.idx===idx){// correct match
      const next=[...matched,idx];
      setMatched(next);
      setSelected(null);
      if(next.length===pairs.length)setTimeout(onDone,1200);
    } else {
      setWrongFlash(idx);
      setTimeout(()=>{setWrongFlash(null);setSelected(null);},700);
    }
  };

  return<div style={{width:'100%',maxWidth:360,margin:'0 auto',textAlign:'center'}}>
    <div style={{fontFamily:'Nunito',fontWeight:700,fontSize:16,color:'rgba(255,255,255,.85)',marginBottom:10}}>
      Match the letter to its picture! 🔗
    </div>
    <div className="match-pairs">
      {pairs.map((p,i)=>(
        <button key={`l${i}`} className={`match-card letter${selected?.type==='letter'&&selected?.idx===i?' selected':''}${matched.includes(i)?' matched':''}`}
          onClick={()=>handleLetter(i)} aria-label={`Letter ${p.phoneme}`} lang="ar">{p.letter}</button>
      ))}
      {pairs.map((p,i)=>(
        <button key={`e${i}`} className={`match-card emoji-card${selected?.type==='emoji'&&selected?.idx===i?' selected':''}${matched.includes(i)?' matched':''}${wrongFlash===i?' wrong-flash':''}`}
          onClick={()=>handleEmoji(i)} aria-label={p.emoji}>{p.emoji}</button>
      ))}
    </div>
    <div style={{fontFamily:'Nunito',fontSize:13,color:'rgba(255,255,255,.5)',marginTop:4}}>
      Tap a letter, then tap its picture
    </div>
  </div>;
}

/* ═══════════════════════════════════════
   ARABIC WORLD — MAIN CONTROLLER
═══════════════════════════════════════ */
function ArabicWorld({onHome,stickerBoard}){
  const{speak,speakRepeat}=useSpeedSpeech();
  const{stickers,addSticker}=stickerBoard;
  const{progress,showRest,lettersSeen,markLetterSeen}=useSessionTracker('arabic');
  const[letterIdx,setLetterIdx]=useState(()=>{
    const seen=JSON.parse(localStorage.getItem('ls_session_arabic_letters')||'[]');
    const u=ARABIC_LETTERS.findIndex(l=>!seen.includes(l.letter));
    return u>=0?u:0;
  });
  // steps: intro | wordpick | trace | recall | hunt | match
  const[step,setStep]=useState('intro');
  const[isPlaying,setIsPlaying]=useState(false);
  const[isPlayingWord,setIsPlayingWord]=useState(false);
  const[celebrate,setCelebrate]=useState(false);
  const[showStickers,setShowStickers]=useState(false);
  const[restAcked,setRestAcked]=useState(false);
  const[huntRound,setHuntRound]=useState(0);
  const[matchRound,setMatchRound]=useState(0);
  const[wbRound,setWbRound]=useState(0);
  const[isSinging,setIsSinging]=useState(false);

  const letterData=ARABIC_LETTERS[letterIdx];
  const HUNT_ROUNDS=3;
  const MATCH_ROUNDS=2;

  useEffect(()=>{
    setIsSinging(false);
    setIsPlayingWord(false);
    const t=setTimeout(()=>{
      setIsPlaying(true);
      speakRepeat(letterData.phoneme,'ar-SA',0.65,3,1200);
      // after phoneme repeats, speak the full word in Arabic
      const wordDelay=3*1200+1800;
      const tw=setTimeout(()=>{
        setIsPlayingWord(true);
        speak(letterData.word,'ar-SA',0.65);
        setTimeout(()=>setIsPlayingWord(false),2000);
      },wordDelay);
      setTimeout(()=>setIsPlaying(false),4500);
      return()=>clearTimeout(tw);
    },600);
    markLetterSeen(letterData.letter);
    return()=>clearTimeout(t);
  },[letterIdx]);

  const playSoundOnce=()=>{setIsPlaying(true);speak(letterData.phoneme,'ar-SA',0.65);setTimeout(()=>setIsPlaying(false),1500);};

  const playWordOnce=()=>{
    setIsPlayingWord(true);
    speak(letterData.word,'ar-SA',0.65);
    setTimeout(()=>setIsPlayingWord(false),2200);
  };

  const playSong=()=>{
    setIsSinging(true);
    // Sing the Arabic song slowly — repeat twice
    speak(letterData.songAr,'ar-SA',0.62);
    const dur=letterData.songAr.length*55+1400;
    setTimeout(()=>{
      speak(letterData.songAr,'ar-SA',0.62);
      setTimeout(()=>setIsSinging(false),dur);
    },dur);
  };

  const advance=()=>{
    const steps=['intro','wordpick','trace','recall','hunt','match'];
    const cur=steps.indexOf(step);
    if(cur<steps.length-1){
      setStep(steps[cur+1]);
      if(steps[cur+1]==='recall'||steps[cur+1]==='hunt'){
        setTimeout(()=>{setIsPlaying(true);speak(letterData.phoneme,'ar-SA',0.65);setTimeout(()=>setIsPlaying(false),1500);},400);
      }
    } else {
      // letter complete!
      handleLetterComplete();
    }
  };

  const handleLetterComplete=()=>{
    setCelebrate(true);
    addSticker(letterData.sticker);
    speak('Excellent! You learned a new letter!','en-US',0.85);
    setTimeout(()=>{
      setCelebrate(false);
      setLetterIdx(i=>(i+1)%ARABIC_LETTERS.length);
      setStep('intro');
      setHuntRound(0);
      setMatchRound(0);
      setWbRound(0);
    },2200);
  };

  const handleHuntCorrect=()=>{
    addSticker('⭐');
    speak('Found it! Great eyes!','en-US',0.85);
    if(huntRound+1>=HUNT_ROUNDS){
      setTimeout(()=>advance(),1000);
    } else {
      setHuntRound(r=>r+1);
    }
  };

  const timerPct=`${Math.round(progress*100)}%`;

  if(showRest&&!restAcked)return(
    <div className="screen arabic-bg" style={{justifyContent:'center'}}>
      <button className="back-btn" onClick={onHome} aria-label="Go home">🏠</button>
      <RestMoment onContinue={()=>setRestAcked(true)}/>
    </div>
  );

  return<div className="screen arabic-bg">
    {[{top:'8%',left:'10%',d:0},{top:'15%',right:'12%',d:.5},{top:'30%',left:'5%',d:1},{top:'5%',left:'55%',d:.8}].map((s,i)=>(
      <span key={i} className="star-deco" style={{top:s.top,left:s.left,right:s.right,animationDelay:`${s.d}s`,animationDuration:`${1.5+s.d}s`,color:'#FFE57A',position:'absolute'}} aria-hidden="true">✦</span>
    ))}
    <button className="back-btn" onClick={onHome} aria-label="Go home">🏠</button>
    <button className="sticker-tray-btn" onClick={()=>setShowStickers(true)} aria-label={`Sticker board – ${stickers.length} earned`}>🏆</button>
    <div className="session-timer" aria-label="Session progress">
      🌙<div className="timer-track" role="presentation"><div className="timer-fill-moon" style={{width:timerPct}}/></div><span>rest soon</span>
    </div>
    <div className="world-title arabic-world-title">🌙 Arabic Letters</div>
    <div className="info-chip" style={{color:'rgba(255,255,255,.65)',marginBottom:2}}>Letter {letterIdx+1} of {ARABIC_LETTERS.length}</div>

    <ProgressDots total={6} current={['intro','wordpick','trace','recall','hunt','match'].indexOf(step)} theme="arabic"/>
    <div className="step-label" style={{color:'rgba(255,255,255,.45)'}}>
      {step==='intro'?'Hear & See':step==='wordpick'?'Pick the Word':step==='trace'?'Trace':step==='recall'?'Recall':step==='hunt'?'Letter Hunt':'Match Pairs'}
    </div>

    {step==='intro'&&<LetterIntro letterData={letterData} isPlaying={isPlaying} isPlayingWord={isPlayingWord} onSayIt={playSoundOnce} onSayWord={playWordOnce} onNext={advance} onSing={playSong} isSinging={isSinging}/>}

    {step==='wordpick'&&<WordPickStep letterData={letterData} onCorrect={advance} speak={speak}/>}

    {step==='trace'&&<LetterTrace letterData={letterData} onNext={advance}/>}

    {step==='recall'&&(
      <div className="arabic-letter-card" style={{padding:'14px 20px 18px'}}>
        {isPlaying&&<SoundWave/>}
        <LetterRecall letterData={letterData} allLetters={ARABIC_LETTERS} onCorrect={advance}/>
        <button className="play-sound-btn" onClick={playSoundOnce} style={{marginTop:14}} aria-label="Play sound again">🔊</button>
      </div>
    )}

    {step==='hunt'&&(
      <div className="arabic-letter-card" style={{padding:'14px 16px 18px'}}>
        <LetterHunt targetLetter={letterData} allLetters={ARABIC_LETTERS} onCorrect={handleHuntCorrect} roundsLeft={HUNT_ROUNDS-huntRound}/>
        <button className="play-sound-btn" onClick={playSoundOnce} style={{marginTop:10}} aria-label="Play sound again">🔊</button>
      </div>
    )}

    {step==='match'&&(
      <div className="arabic-letter-card" style={{padding:'14px 16px 18px'}}>
        <LetterMatch letters={ARABIC_LETTERS.slice(Math.max(0,letterIdx-3),letterIdx+1)} onDone={handleLetterComplete} speak={speak}/>
      </div>
    )}

    <CelebrationBurst show={celebrate}/>
    {showStickers&&<StickerBoard stickers={stickers} onClose={()=>setShowStickers(false)}/>}
  </div>;
}

/* ═══════════════════════════════════════
   MATH — COUNTING MODULE (1–10)
═══════════════════════════════════════ */
function CountingModule({onBack}){
  const{speak}=useSpeedSpeech();
  const[round,setRound]=useState(0);
  const[animals,setAnimals]=useState([]);
  const[phase,setPhase]=useState('concrete');
  const[celebrate,setCelebrate]=useState(false);
  const targetCount=useMemo(()=>round+1,[round]);// 1 through 10
  const targetAnimal=useMemo(()=>COUNTING_ANIMALS[round%COUNTING_ANIMALS.length],[round]);
  const WORDS=['one','two','three','four','five','six','seven','eight','nine','ten'];

  const addAnimal=()=>{
    if(animals.length>=targetCount)return;
    const next=[...animals,{id:Date.now(),emoji:targetAnimal}];
    setAnimals(next);
    speak(`${next.length}`,'en-US',0.8);
    if(next.length===targetCount){
      setTimeout(()=>{setPhase('pictorial');speak(`${targetCount}! Let's see the number!`,'en-US',.85);},700);
    }
  };

  const handlePictorial=()=>{
    setPhase('abstract');
    speak(`${targetCount}! ${WORDS[targetCount-1]}!`,'en-US',.85);
  };

  const nextRound=()=>{
    if(round+1>=10){setCelebrate(true);speak('Amazing! You counted to ten! You\'re a star!','en-US',.85);setTimeout(()=>{setCelebrate(false);onBack();},2500);}
    else{setRound(r=>r+1);setAnimals([]);setPhase('concrete');}
  };

  return<div style={{width:'100%',maxWidth:420,textAlign:'center'}}>
    <CelebrationBurst show={celebrate}/>
    <div className="cpa-label">{phase==='concrete'?'Concrete':phase==='pictorial'?'Pictorial':'Abstract'}</div>
    <div style={{display:'flex',gap:6,justifyContent:'center',marginBottom:6}}>
      {Array.from({length:10}).map((_,i)=>(
        <div key={i} style={{width:18,height:18,borderRadius:'50%',background:i<round?'var(--navy)':i===round?'#4EAD8A':'rgba(27,58,92,.15)',transition:'background .3s'}}/>
      ))}
    </div>

    {phase==='concrete'&&<>
      <div className="instruction">Tap to add {targetAnimal}! Count to {targetCount}!</div>
      <div className="animal-grid" role="region" aria-live="polite" aria-label="Animal counting area">
        {animals.map(a=><span key={a.id} className="animal-emoji" role="img" aria-label={targetAnimal}>{a.emoji}</span>)}
        {animals.length<targetCount&&<span style={{fontSize:26,opacity:.3}} aria-hidden="true">➕</span>}
      </div>
      <button className="count-btn" onClick={addAnimal} aria-label={`Add ${targetAnimal}`}>
        ➕ Add {targetAnimal} ({animals.length}/{targetCount})
      </button>
    </>}

    {phase==='pictorial'&&<>
      <div className="instruction">Count them! 🎉</div>
      <div className="animal-grid">{animals.map(a=><span key={a.id} className="animal-emoji" role="img">{a.emoji}</span>)}</div>
      <button className="count-btn" onClick={handlePictorial}>I count {targetCount}! ✨</button>
    </>}

    {phase==='abstract'&&<>
      <div className="instruction">The number is…</div>
      <div className="numeral-display" role="text" aria-label={`Number ${targetCount}`}>{targetCount}</div>
      <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:22,color:'#4EAD8A',marginTop:6,textTransform:'capitalize'}}>{WORDS[targetCount-1]}!</div>
      <button className="count-btn" style={{marginTop:14}} onClick={nextRound}>
        {round+1<10?'Next number ➡️':'🌟 All done!'}
      </button>
    </>}
  </div>;
}

/* ═══════════════════════════════════════
   MATH — SHAPES MODULE (6 shapes)
═══════════════════════════════════════ */
function ShapeSVG({type,color,size=70}){
  const s=size;
  if(type==='circle')return<svg width={s} height={s} viewBox="0 0 80 80"><circle cx="40" cy="40" r="35" fill={color}/></svg>;
  if(type==='rect')return<svg width={s} height={s} viewBox="0 0 80 80"><rect x="8" y="8" width="64" height="64" rx="8" fill={color}/></svg>;
  if(type==='triangle')return<svg width={s} height={s} viewBox="0 0 80 80"><polygon points="40,6 74,74 6,74" fill={color}/></svg>;
  if(type==='star')return<svg width={s} height={s} viewBox="0 0 80 80"><polygon points="40,6 49,30 74,30 54,47 62,72 40,57 18,72 26,47 6,30 31,30" fill={color}/></svg>;
  if(type==='heart')return<svg width={s} height={s} viewBox="0 0 80 80"><path d="M40 70 C40 70 8 50 8 28 C8 16 18 8 28 8 C34 8 40 14 40 14 C40 14 46 8 52 8 C62 8 72 16 72 28 C72 50 40 70 40 70Z" fill={color}/></svg>;
  if(type==='diamond')return<svg width={s} height={s} viewBox="0 0 80 80"><polygon points="40,6 74,40 40,74 6,40" fill={color}/></svg>;
  return null;
}

/* ═══════════════════════════════════════
   MATH — PATTERNS MODULE
═══════════════════════════════════════ */
function PatternsModule({onBack}){
  const{speak}=useSpeedSpeech();
  const[pidx,setPidx]=useState(0);
  const[tapped,setTapped]=useState(null);
  const[correct,setCorrect]=useState(null);
  const[locked,setLocked]=useState(false);

      setTimeout(()=>{sCelebrate(false);setCorrect(null);setTapped(null);setLocked(false);if(pidx+1<PATTERN_SETS.length)setPidx(p=>p+1);else onBack();},1800);}

    </div>
    <div className="pattern-choices">
      {choices.map((ch,i)=>(
        <button key={i} className={`pattern-choice${correct===ch.emoji?' correct':tapped===ch.emoji&&!correct?' tapped':''}`}
          onClick={()=>handle(ch)} aria-label={ch.emoji}>{ch.emoji}</button>
      ))}
    </div>
  </div>;
}

/* ═══════════════════════════════════════
   MATH — ADDITION MODULE
═══════════════════════════════════════ */
function AdditionModule({onBack}){
  const{speak}=useSpeedSpeech();
  const[pidx,setPidx]=useState(0);
  const[tapped,setTapped]=useState(null);
  const[correct,setCorrect]=useState(null);
  const[locked,setLocked]=useState(false);
  const[celebrate,sCelebrate]=useState(false);
  const prob=ADDITION_PROBLEMS[pidx];

  useEffect(()=>{
    speak(`${prob.a} plus ${prob.b} equals… what?`,'en-US',.8);
  },[pidx]);

  const choices=useMemo(()=>[...prob.choices].sort(()=>Math.random()-.5),[pidx]);

  const handle=(n)=>{
    if(locked)return;setLocked(true);setTapped(n);
    if(n===prob.a+prob.b){
      setCorrect(n);speak(`${prob.a} plus ${prob.b} equals ${n}! Wonderful!`,'en-US',.85);sCelebrate(true);
      setTimeout(()=>{sCelebrate(false);setCorrect(null);setTapped(null);setLocked(false);
        if(pidx+1<ADDITION_PROBLEMS.length)setPidx(p=>p+1);else onBack();},1800);
    } else {speak('Try again!','en-US',.8);setTimeout(()=>{setLocked(false);setTapped(null);},800);}
  };

  return<div style={{width:'100%',maxWidth:420,textAlign:'center'}}>
    <CelebrationBurst show={celebrate}/>
    <div className="cpa-label">Adding</div>
    <ProgressDots total={ADDITION_PROBLEMS.length} current={pidx} theme="math"/>
    <div className="instruction" style={{marginTop:8}}>{prob.a} + {prob.b} = ?</div>
    <div className="addition-row" role="region" aria-label={`${prob.a} plus ${prob.b}`}>
      <div className="add-group">{Array.from({length:prob.a}).map((_,i)=><span key={i} className="add-emoji" style={{animationDelay:`${i*.05}s`}}>{prob.emoji}</span>)}</div>
      <div className="add-op">+</div>
      <div className="add-group">{Array.from({length:prob.b}).map((_,i)=><span key={i} className="add-emoji" style={{animationDelay:`${i*.05}s`}}>{prob.emoji}</span>)}</div>
      <div className="add-op">=</div>
      <div style={{fontSize:42,color:'rgba(27,58,92,.25)',fontWeight:900}}>?</div>
    </div>
    <div className="add-answer-choices">
      {choices.map((n,i)=>(
        <button key={i} className={`add-choice${correct===n?' correct':tapped===n&&!correct?' tapped':''}`}
          onClick={()=>handle(n)} aria-label={`Answer: ${n}`}>{n}</button>
      ))}
    </div>
  </div>;
}

/* ═══════════════════════════════════════
   MATH — NUMBER COMPARISON MODULE
═══════════════════════════════════════ */
function ComparisonModule({onBack}){
  const{speak}=useSpeedSpeech();
  const QUESTIONS=useMemo(()=>[
    {question:'Which number is BIGGER?',a:3,b:5,emoji:'⭐',correct:'B',narr:'Which number is bigger? 3 or 5?'},
    {question:'Which number is SMALLER?',a:7,b:2,emoji:'🐟',correct:'B',narr:'Which number is smaller? 7 or 2?'},
    {question:'Which group has MORE?',a:4,b:2,emoji:'🍎',correct:'A',narr:'Which group has more apples?'},
    {question:'Which number is BIGGER?',a:1,b:9,emoji:'🌟',correct:'B',narr:'1 or 9? Which is bigger?'},
    {question:'Which group has FEWER?',a:6,b:3,emoji:'🐱',correct:'B',narr:'Which group has fewer cats?'},
    {question:'Which number is SMALLER?',a:4,b:8,emoji:'🎈',correct:'A',narr:'4 or 8? Which is smaller?'},
  ],[]);
  const[qidx,setQidx]=useState(0);
  const[tapped,setTapped]=useState(null);
  const[correct,setCorrect]=useState(null);
  const[locked,setLocked]=useState(false);
  const[celebrate,sCelebrate]=useState(false);
  const q=QUESTIONS[qidx];
  useEffect(()=>{speak(q.narr,'en-US',.85);},[qidx]);

  const handle=(which)=>{
    if(locked)return;setLocked(true);setTapped(which);
    if(which===q.correct){
      setCorrect(which);speak('Yes! Great thinking! 🌟','en-US',.85);sCelebrate(true);
      setTimeout(()=>{sCelebrate(false);setCorrect(null);setTapped(null);setLocked(false);
        if(qidx+1<QUESTIONS.length)setQidx(i=>i+1);else onBack();},1800);
    } else {speak('Try again!','en-US',.8);setTimeout(()=>{setLocked(false);setTapped(null);},800);}
  };

  return<div style={{width:'100%',maxWidth:420,textAlign:'center'}}>
    <CelebrationBurst show={celebrate}/>
    <div className="cpa-label">Compare</div>
    <ProgressDots total={QUESTIONS.length} current={qidx} theme="math"/>
    <div className="size-question">{q.question}</div>
    <div className="compare-row">
      {(['A','B']).map(which=>{
        const num=which==='A'?q.a:q.b;
        return<div key={which} className={`compare-card${correct===which?' correct':tapped===which&&!correct?' tapped':''}`}
          role="button" tabIndex={0} onClick={()=>handle(which)} aria-label={`Number ${num}`}
          onKeyPress={e=>e.key==='Enter'&&handle(which)}>
          <div className="compare-num">{num}</div>
          <div className="compare-emojis">{Array.from({length:Math.min(num,5)}).map((_,i)=><span key={i}>{q.emoji}</span>)}</div>
        </div>;
      })}
    </div>
  </div>;
}

/* ═══════════════════════════════════════
   MATH — COLORS LEARNING MODULE
   Flow: show color → big examples → tap to name it (3-choice)
═══════════════════════════════════════ */
function ColorsModule({onBack}){
  const{speak}=useSpeedSpeech();
  const[cidx,setCidx]=useState(0);
  const[phase,setPhase]=useState('learn');// learn | quiz
  const[tapped,setTapped]=useState(null);
  const[correct,setCorrect]=useState(null);
  const[locked,setLocked]=useState(false);
  const[celebrate,sCelebrate]=useState(false);
  const color=COLORS_DATA[cidx];

  useEffect(()=>{
    setPhase('learn');setTapped(null);setCorrect(null);setLocked(false);
    speak(`This color is ${color.name}! ${color.name}!`,'en-US',0.72);
  },[cidx]);

  const handleLearnNext=()=>{
    setPhase('quiz');
    speak(`Which one is ${color.name}?`,'en-US',0.72);
  };

  // 3-choice quiz — correct + 2 random wrong
  const choices=useMemo(()=>{
    const wrong=COLORS_DATA.filter((_,i)=>i!==cidx).sort(()=>Math.random()-.5).slice(0,2);
    return[color,...wrong].sort(()=>Math.random()-.5);
  },[cidx]);

  const handleChoice=(c)=>{
    if(locked)return;
    setLocked(true);setTapped(c.name);
    if(c.name===color.name){
      setCorrect(c.name);
      speak(`Yes! That is ${color.name}! Great job!`,'en-US',0.72);
      sCelebrate(true);
      setTimeout(()=>{
        sCelebrate(false);setCorrect(null);setTapped(null);setLocked(false);
        if(cidx+1>=COLORS_DATA.length)onBack();
        else setCidx(i=>i+1);
      },1900);
    } else {
      speak(`Try again!`,'en-US',0.75);
      setTimeout(()=>{setLocked(false);setTapped(null);},800);
    }
  };

  return<div style={{width:'100%',maxWidth:420,textAlign:'center'}}>
    <CelebrationBurst show={celebrate}/>
    <div className="cpa-label">Colors</div>
    <ProgressDots total={COLORS_DATA.length} current={cidx} theme="math"/>

    {phase==='learn'&&<>
      <div className="instruction" style={{marginTop:8}}>This color is…</div>
      {/* big color swatch */}
      <div style={{width:140,height:140,borderRadius:32,background:color.hex,margin:'12px auto',boxShadow:`0 8px 0 ${color.border}88,0 12px 28px rgba(0,0,0,.18)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:70,animation:'float 2.5s ease-in-out infinite'}}>
        {color.emoji}
      </div>
      <div style={{fontFamily:'Fredoka One',fontSize:34,color:color.hex,textShadow:`0 3px 0 ${color.border}66`,marginBottom:8}}>{color.name}</div>
      {/* real-world examples */}
      <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap',background:'rgba(255,255,255,.6)',borderRadius:20,padding:'12px',margin:'8px 0'}}>
        {color.examples.map((e,i)=>(
          <span key={i} style={{fontSize:38,animation:`popIn .4s cubic-bezier(.34,1.56,.64,1) ${i*100}ms both`}}
            role="img" aria-label={color.name}>{e}</span>
        ))}
      </div>
      <div style={{fontFamily:'Nunito',fontWeight:700,fontSize:13,color:'rgba(27,58,92,.55)',marginBottom:10}}>
        All these things are {color.name}!
      </div>
      <button className="next-btn" onClick={handleLearnNext} aria-label={`Quiz time for ${color.name}`}>
        Quiz time! 🎯
      </button>
    </>}

    {phase==='quiz'&&<>
      <div className="instruction" style={{marginTop:8}}>Which one is <span style={{color:color.hex}}>{color.name}</span>?</div>
      <div style={{display:'flex',gap:14,justifyContent:'center',flexWrap:'wrap',marginTop:12}}>
        {choices.map(c=>(
          <button key={c.name}
            onClick={()=>handleChoice(c)}
            style={{
              width:96,height:96,borderRadius:22,border:`3px solid ${correct===c.name?c.hex:tapped===c.name&&correct!==c.name?'#FF6B6B':'rgba(27,58,92,.15)'}`,
              background:correct===c.name?c.bg:tapped===c.name&&correct!==c.name?'#FFE5E5':'rgba(255,255,255,.7)',
              cursor:'pointer',
              animation:correct===c.name?'correctPop .5s ease':tapped===c.name&&correct!==c.name?'wobble .4s ease':'none',
              display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,
            }}
            aria-label={c.name}>
            <span style={{fontSize:36,lineHeight:1}}>{c.emoji}</span>
            <span style={{fontFamily:'Fredoka One',fontSize:14,color:c.hex}}>{c.name}</span>
          </button>
        ))}
      </div>
    </>}
  </div>;
}

/* ═══════════════════════════════════════
   MATH — COLOR SORT MODULE
═══════════════════════════════════════ */
function ColorSortModule({onBack}){
  const{speak}=useSpeedSpeech();
  const[selected,setSelected]=useState(null);
  const[buckets,setBuckets]=useState({red:[],yellow:[],orange:[],purple:[]});
  const[remaining,setRemaining]=useState([...COLOR_SORT_DATA]);
  const[celebrate,sCelebrate]=useState(false);
  useEffect(()=>{speak('Sort the items by color! Tap an item, then tap its bucket!','en-US',.85);},[]);
  const handleItem=(item)=>setSelected(selected?.emoji===item.emoji?null:item);
  const handleBucket=(color)=>{
    if(!selected)return;
    if(selected.color===color){
      const nb={...buckets,[color]:[...buckets[color],selected.emoji]};setBuckets(nb);
      const nr=remaining.filter(r=>r.emoji!==selected.emoji);setRemaining(nr);
      setSelected(null);speak(`${selected.emoji} goes in ${color}!`,'en-US',.8);
      if(nr.length===0){sCelebrate(true);speak('You sorted everything! Amazing!','en-US',.85);setTimeout(()=>{sCelebrate(false);onBack();},2500);}
    } else {speak('Try a different bucket!','en-US',.8);setSelected(null);}
  };
  return<div style={{width:'100%',maxWidth:440,textAlign:'center'}}>
    <CelebrationBurst show={celebrate}/>
    <div className="cpa-label">Color Sort</div>
    <div className="instruction">Sort by color! 🌈</div>
    <div style={{fontFamily:'Nunito',fontSize:13,color:'rgba(27,58,92,.55)',marginBottom:4}}>Tap item 👆 then tap its color!</div>
    <div className="sort-items-row" role="region" aria-live="polite">
      {remaining.map((item,i)=>(
        <span key={item.emoji+i} className={`sort-item${selected?.emoji===item.emoji?' selected':''}`}
          role="button" tabIndex={0} onClick={()=>handleItem(item)} aria-label={`${item.emoji} ${item.label}`}
          onKeyPress={e=>e.key==='Enter'&&handleItem(item)}>{item.emoji}</span>
      ))}
      {remaining.length===0&&<span style={{fontSize:40}}>🎉</span>}
    </div>
    <div className="sort-buckets">
      {COLOR_BUCKETS.map(b=>(
        <div key={b.color} className={`sort-bucket${selected?.color===b.color?' lit':''}`}
          style={{background:b.bg,borderColor:b.border}} role="button" tabIndex={0}
          onClick={()=>handleBucket(b.color)} aria-label={`${b.label} bucket`}
          onKeyPress={e=>e.key==='Enter'&&handleBucket(b.color)}>
          <div style={{fontFamily:'Nunito',fontWeight:700,fontSize:11,color:b.border,marginBottom:3}}>{b.label}</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:2,justifyContent:'center'}}>
            {buckets[b.color].map((e,i)=><span key={i} className="sorted-emoji">{e}</span>)}
          </div>
        </div>
      ))}
    </div>
  </div>;
}

/* ═══════════════════════════════════════
   MATH WORLD — MAIN CONTROLLER
═══════════════════════════════════════ */
function MathWorld({onHome,stickerBoard}){
  const{speak}=useSpeedSpeech();
  const{addSticker}=stickerBoard;
  const{progress,showRest}=useSessionTracker('math');
  const[screen,setScreen]=useState('menu');// menu | intro | module
  const[activeModule,setActiveModule]=useState(null);
  const[showCartoon,setShowCartoon]=useState(false);
  const[restAcked,setRestAcked]=useState(false);
  const[showStickers,setShowStickers]=useState(false);
  const timerPct=`${Math.round(progress*100)}%`;

  const launchModule=(mod)=>{
    setActiveModule(mod);
    setScreen('intro');
  };

  const startPractice=()=>{
    setShowCartoon(false);
    setScreen('module');
  };

  const handleModuleDone=()=>{
    addSticker('⭐');
    setScreen('menu');
    setActiveModule(null);
  };

  const subBack=()=>{setScreen('menu');setActiveModule(null);};

  if(showRest&&!restAcked)return(
    <div className="screen math-bg" style={{justifyContent:'center'}}>
      <button className="back-btn" onClick={onHome} aria-label="Go home">🏠</button>
      <RestMoment onContinue={()=>setRestAcked(true)}/>
    </div>
  );

  return<div className="screen math-bg">
    {[{top:'8%',left:'5%',d:0},{top:'12%',right:'8%',d:1},{top:'25%',left:'50%',d:.5}].map((c,i)=>(
      <span key={i} className="cloud-deco" style={{top:c.top,left:c.left,right:c.right,animationDelay:`${c.d}s`}} aria-hidden="true">☁️</span>
    ))}
    <button className="back-btn" onClick={()=>{if(screen!=='menu')setScreen('menu');else onHome();}} aria-label="Go back">🏠</button>
    <button className="sticker-tray-btn" onClick={()=>setShowStickers(true)} aria-label={`Sticker board – ${stickerBoard.stickers.length} earned`} style={{fontSize:22}}>🏆</button>
    <div className="math-session-timer" aria-label="Session progress">
      ☀️<div className="timer-track-sun"><div className="timer-fill-sun" style={{width:timerPct}}/></div><span style={{fontSize:12}}>rest soon</span>
    </div>
    <div className="world-title math-world-title">☀️ Math &amp; Logic</div>

    {/* MODULE MENU */}
    {screen==='menu'&&(
      <>
        <div style={{fontFamily:'Nunito',fontWeight:700,fontSize:14,color:'rgba(27,58,92,.6)',marginBottom:10}}>Pick an activity!</div>
        <div className="math-module-grid">
          {MATH_MODULES.map((m)=>(
            <button key={m.id} className="math-module-btn" style={{background:m.color,boxShadow:`0 5px 0 ${m.shadow},0 8px 20px rgba(0,0,0,.1)`}}
              onClick={()=>launchModule(m)} aria-label={m.label.replace('\n',' ')}>
              <span className="mod-icon" aria-hidden="true">{m.icon}</span>
              <span style={{whiteSpace:'pre-line',lineHeight:1.2}}>{m.label}</span>
              <span style={{fontFamily:'Nunito',fontWeight:600,fontSize:11,opacity:.65}}>{m.desc}</span>
            </button>
          ))}
        </div>
      </>
    )}

    {/* INTRO — watch cartoon or skip */}
    {screen==='intro'&&activeModule&&(
      <div style={{width:'100%',maxWidth:420,marginTop:10,animation:'fadeIn .3s ease',display:'flex',flexDirection:'column',alignItems:'center',gap:14}}>
        <button onClick={subBack} style={{alignSelf:'flex-start',background:'rgba(27,58,92,.1)',border:'none',borderRadius:12,padding:'7px 14px',fontFamily:'Nunito',fontWeight:700,fontSize:13,color:'var(--navy)',cursor:'pointer'}}>← Back</button>
        <div style={{fontSize:56,animation:'float 2.5s ease-in-out infinite'}}>{activeModule.icon}</div>
        <div style={{fontFamily:'Fredoka One',fontSize:22,color:'var(--navy)',textAlign:'center'}}>{activeModule.label.replace('\n',' ')}</div>
        <div style={{fontFamily:'Nunito',fontWeight:700,fontSize:14,color:'rgba(27,58,92,.55)',textAlign:'center'}}>Watch a quick cartoon first — then practice!</div>
        <button onClick={()=>setShowCartoon(true)}
          style={{background:'linear-gradient(135deg,#FF6B6B,#FF4444)',border:'none',borderRadius:20,padding:'14px 32px',fontFamily:'Fredoka One',fontSize:18,color:'#fff',cursor:'pointer',boxShadow:'0 5px 0 #991010,0 8px 20px rgba(0,0,0,.2)',display:'flex',alignItems:'center',gap:10,minHeight:60}}
          aria-label="Watch mini cartoon">
          🎬 Watch Mini Cartoon
        </button>
        <button onClick={startPractice}
          style={{background:'rgba(27,58,92,.1)',border:'none',borderRadius:14,padding:'11px 28px',fontFamily:'Nunito',fontWeight:700,fontSize:14,color:'rgba(27,58,92,.55)',cursor:'pointer'}}
          aria-label="Skip cartoon and go to practice">
          Skip → Go straight to practice
        </button>
      </div>
    )}

    {/* ACTIVE MODULE */}
    {screen==='module'&&activeModule&&(
      <div style={{width:'100%',maxWidth:440,marginTop:10,animation:'fadeIn .3s ease'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
          <button onClick={subBack} style={{background:'rgba(27,58,92,.1)',border:'none',borderRadius:12,padding:'7px 14px',fontFamily:'Nunito',fontWeight:700,fontSize:13,color:'var(--navy)',cursor:'pointer'}}>← Back</button>
          <div style={{fontFamily:'Fredoka One',fontSize:17,color:'var(--navy)'}}>{activeModule.icon} {activeModule.label.replace('\n',' ')}</div>
          <button onClick={()=>{setShowCartoon(true);}} style={{marginLeft:'auto',background:'rgba(255,100,100,.1)',border:'none',borderRadius:12,padding:'7px 14px',fontFamily:'Nunito',fontWeight:700,fontSize:12,color:'#cc3030',cursor:'pointer'}}>🎬 Cartoon</button>
        </div>
        {activeModule.id==='counting'&&<CountingModule onBack={handleModuleDone}/>}
        {activeModule.id==='shapes'&&<ShapesModule onBack={handleModuleDone}/>}
        {activeModule.id==='colors'&&<ColorsModule onBack={handleModuleDone}/>}
        {activeModule.id==='patterns'&&<PatternsModule onBack={handleModuleDone}/>}
        {activeModule.id==='addition'&&<AdditionModule onBack={handleModuleDone}/>}
        {activeModule.id==='comparison'&&<ComparisonModule onBack={handleModuleDone}/>}
        {activeModule.id==='colorsort'&&<ColorSortModule onBack={handleModuleDone}/>}
      </div>
    )}

    {/* MINI CARTOON OVERLAY */}
    {showCartoon&&activeModule&&<MiniCartoon concept={activeModule.concept} onClose={startPractice}/>}
    {showStickers&&<StickerBoard stickers={stickerBoard.stickers} onClose={()=>setShowStickers(false)}/>}
  </div>;
}
